build_peer_list:
  description: |-
    请基于 {industry_pack_text}、{business_pack_text} 和公开资料搜索，为{company_name}的同行信息分析包生成同行清单 Source Markdown。
    输入：
    - 行业分析包：{industry_pack_text}
    - 业务分析包：{business_pack_text}
    - 输出路径：{peer_list_source_output_path}

    执行要求：
    - 先阅读行业分析包和业务分析包，确定{company_name}的主营业务和行业，再用公开资料搜索补充同类公司名单、股票代码、公司及主营业务介绍和选取原因。
    - 本任务只负责确定可比公司样本、纳入理由和排除逻辑，不负责批量拉取同行财务指标。
    - 搜索{company_name}是否已在公开股权市场上市，如已上市，要识别并写明对应上市地的股票代码。
    - 最终只输出 Markdown 正文。
  expected_output: |
    # {company_name} 同行信息分析包 Peer List Source

    ## ENTRY D_PEER_001
    - 问题：可比公司提取
    - 期望输出：请直接按下列 Markdown 表格结构输出可比公司基本信息。你可以选择不超过8个可比公司，一般3-5个即可。但不得少于3个。可比公司都选择上市公司。如果{company_name}在其他市场已上市，也要返回该上市代码
      | 可比公司名称 | 股票代码 | 公司及主营业务介绍 | 选取原因 |
      | --- | --- | --- | --- |
      | {company_name} |  |  |  | （如果在其他市场已上市，加这一行）
      | 可比公司1 |  |  |  |
      | 可比公司2 |  |  |  |
      | 可比公司3 |  |  |  |
      | 可比公司4 |  |  |  |
      | 可比公司5 |  |  |  |
    - 输出内容：
  agent: peer_list_agent
  output_file: '{peer_list_source_output_path}'

collect_peer_data:
  description: |-
    请基于同行清单 source 和 Tushare，为{company_name}的同行信息分析包生成同行数据 Source Markdown。
    输入：
    - 上游同行清单 source：由 build_peer_list 生成
    - 输出路径：{peer_data_source_output_path}

    执行要求：
    - 优先使用上游同行清单 source 中已确认的可比公司名单。
    - 只使用 Tushare 工具补充同行财务、估值和资本结构等数据。
    - 严格按照 expected_output 的 ENTRY 结构逐条输出，并保留 entry_id。
    - 输出内容必须基于 Tushare 原始返回结果或由原始字段稳定推导出的指标。
    - 每个条目都必须完整保留 entry_id，并按“期望输出”要求的字段和格式填写“输出内容”。
    - 如果 Tushare 无法稳定覆盖某个指标或期间，也必须保留 entry_id，并在输出内容里明确写“无信息”或“工具未返回信息”。
    - 不要输出最终 pack，不要改写其他专题内容。
    - 最终只输出 Markdown 正文。
  expected_output: |
