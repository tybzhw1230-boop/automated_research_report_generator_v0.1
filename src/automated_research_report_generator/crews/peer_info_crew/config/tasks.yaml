  description: |-
    请基于 {company_name} 当前专题的两份 source md 输出 同行信息分析包。
    输入：
    - Peer List Source：由 build_peer_list 生成，路径为 {peer_list_source_output_path}
    - Peer Data Source：由 collect_peer_data 生成，路径为 {peer_data_source_output_path}
    - 输出路径：{pack_output_path}

    执行要求：
    - 只基于带 entry_id 的两份 source md 进行综合。
    - 对 source 中缺失或冲突的信息要显式写出边界。

    - 最终 pack 不要求逐条保留 entry_id，但结论必须能追溯回 source。
    - 最终只输出 Markdown 正文。
  expected_output: |
    严格按下列格式形成一份结构化文本，严格使用下列标题作为标题，不得遗漏以下任何一个标题，不要增加任何标题和分节。必要时可以补充表格辅助阅读。
    每节要求写明：内容 / 来源 / 待确认事项。

