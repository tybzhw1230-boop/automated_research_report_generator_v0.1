  agent: search_agent
  output_file: '{search_source_output_path}'

synthesize_and_output:
  crew_name: business_crew
  pack_name: business_pack
  pack_title: 业务分析包
  description: |-
    请基于 {company_name} 当前专题的两份 source md 输出 业务分析包。
    输入：
    - File Source：由 extract_from_pdf 生成，路径为 {file_source_output_path}
    - Search Source：由 search_public_sources 生成，路径为 {search_source_output_path}
    - 输出路径：{pack_output_path}

    执行要求：
    - 只基于带 entry_id 的两份 source md 进行综合。
    - 对 source 中缺失或冲突的信息要显式写出边界。

    - 最终 pack 不要求逐条保留 entry_id，但结论必须能追溯回 source。
    - 最终只输出 Markdown 正文。
  expected_output: |
    严格按下列格式形成一份结构化文本，严格使用下列标题作为标题，不得遗漏以下任何一个标题，不要增加任何标题和分节。必要时可以补充表格辅助阅读。

    # {company_name} 业务分析
    ## 1. 产品与解决方案
    - 1.1 产品/服务矩阵与分类
    - 1.2 核心产品的技术特征与差异化
    - 1.3 产品生命周期与迭代节奏
    ## 2. 客户与需求场景
    - 2.1 目标客户群体与典型需求场景
    - 2.2 客户集中度与前五大客户占比
    - 2.3 客户粘性与复购/续约特征
    ## 3. 收入模式与商业闭环
    - 3.1 收入确认方式与商业模式类型（项目制/订阅制/许可制等）
    - 3.2 从获客到交付到回款的完整闭环
    - 3.3 单位经济模型（如有数据）
    ## 4. 供应链与交付能力
    - 4.1 关键供应商与采购集中度
    - 4.2 交付流程与产能瓶颈
    - 4.3 供应链风险与替代方案
    ## 5. 技术与竞争优势
    - 5.1 技术来源（自研/外购/合作）与研发投入
    - 5.2 核心竞争壁垒与护城河强度
    - 5.3 与主要竞争对手的差异化定位
    ## 6. 扩张路径与关键分歧
    - 6.1 管理层披露的增长战略
    - 6.2 扩张路径的可行性评估
    - 6.3 待验证的关键商业假设
  agent: synthesizing_agent
  output_file: '{pack_output_path}'
