extract_from_pdf:
  description: |-
    请根据 PDF 为{company_name}的业务分析包生成 File Source Markdown。
    输入：
    - PDF 文件路径：{pdf_file_path}
    - 页码索引路径：{page_index_file_path}
    - 输出路径：{file_source_output_path}

    执行要求：
    - 先读取 PDF 页面索引，再按需读取相关页面。
    - 严格按照 expected_output 的 ENTRY 结构逐条输出，并保留 entry_id。
    - 输出内容必须基于 PDF 中的原始信息，原则上不更改文件中的信息，尽量不选取材料中广告成分较大的部分。
    - 每个条目都必须完整保留 entry_id，并按“期望输出”要求的字段和格式填写“输出内容”。
    - 如果没有信息或该问题不适用该公司，也必须保留 entry_id，并在输出内容里输出“无信息”或“不适用”。一个entry有多个小问，部分可以回答，部分不可以回答，明确区分开。
    - 不要输出最终 pack，不要改写其他专题内容。
    - 最终只输出 Markdown 正文。
  expected_output: |
    # {company_name} 业务分析包 File Source

    ## ENTRY D_BUS_002
    - 问题：产品经营情况
    - 期望输出：请直接按下列 Markdown 表格结构输出主要产品/服务的分类名称、用途描述、产品特点，以及 {FY-3}、{FY-2}、{FY-1}、{FQ-1}、{FQ0/FY0} 各期收入和收入占比。
      | 产品/服务分类 | 用途描述 | 产品特点 | {FY-3}收入金额 | {FY-3}收入占比 | {FY-2}收入金额 | {FY-2}收入占比 | {FY-1}收入金额 | {FY-1}收入占比 | {FQ-1}收入金额 | {FQ-1}收入占比 | {FQ0/FY0}收入金额 | {FQ0/FY0}收入占比 |
      | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |
      | 主要产品/服务1 |  |  |  |  |  |  |  |  |  |  |  |  |
      | 主要产品/服务2 |  |  |  |  |  |  |  |  |  |  |  |  |
      | 主要产品/服务3 |  |  |  |  |  |  |  |  |  |  |  |  |
    - 输出内容：

    ## ENTRY F_BUS_002
    - 问题：收入模式及盈利模式
    - 期望输出：主要客户类型、主要客户所在行业、收入来源（产品销售/服务费用/订阅费/授权费等）、计价方式、合作周期。公司如何赚钱的核心逻辑及论述。
    - 输出内容：

    ## ENTRY F_BUS_004
    - 问题：商业模式迭代方向
    - 期望输出：公司商业模式是否稳定，是否正在或计划商业模式的迭代演变。
    - 输出内容：

    ## ENTRY F_BUS_005
    - 问题：核心竞争优势
    - 期望输出：公司的主要竞争优势。包括产品矩阵优势、客户资源优势、供应链优势、品牌优势、技术优势、资金优势、先行者优势等方面的内容。
    - 输出内容：

    ## ENTRY F_BUS_006
    - 问题：产品生命周期阶段
    - 期望输出：各产品所处生命周期阶段及理由。
    - 输出内容：

    ## ENTRY F_BUS_007
    - 问题：新品管线
    - 期望输出：在研/在推新产品、预期上市时间及空间。
    - 输出内容：

    ## ENTRY F_BUS_008
    - 问题：产品定价策略
    - 期望输出：定价策略（成本加成/市场定价/竞争定价）。
    - 输出内容：

    ## ENTRY F_BUS_009
    - 问题：产品品牌溢价
    - 期望输出：品牌带来的溢价空间及品牌认知度。
    - 输出内容：

    ## ENTRY F_BUS_010
    - 问题：产品组合协同效应
    - 期望输出：产品间的交叉销售及协同效应，如有。如没有就输出没有
    - 输出内容：

    ## ENTRY D_BUS_004
    - 问题：收入按销售模式
    - 期望输出：若公司存在多个销售模式，请直接按下列 Markdown 表格结构输出各销售模式（如直销、经销、线上、代理等）在FY-3、FY-2、FY-1、FQ-1、FQ0/FY0的收入金额、收入占比及渠道价值。一般公司没特殊指明默认为直销。若只有单一销售模式就输出一句话描述即可。
      | 销售模式 | {FY-3}收入金额 | {FY-3}收入占比 | {FY-2}收入金额 | {FY-2}收入占比 | {FY-1}收入金额 | {FY-1}收入占比 | {FQ-1}收入金额 | {FQ-1}收入占比 | {FQ0/FY0}收入金额 | {FQ0/FY0}收入占比 | 渠道价值 |
      | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |
      | 销售模式1 |  |  |  |  |  |  |  |  |  |  |  |
      | 销售模式2 |  |  |  |  |  |  |  |  |  |  |  |
      | 销售模式3 |  |  |  |  |  |  |  |  |  |  |  |
    - 输出内容：

    ## ENTRY F_BUS_012
    - 问题：销售模式详情
    - 期望输出：各类销售模式的客户获取方式、团队结构；如有经销模式需描述经销体系的层级、管理、让利模式、准入淘汰、终端客户画像；如有连锁/加盟模式需描述连锁体系的结构、准入、让利模式、管理方式等情况。
    - 输出内容：

    ## ENTRY F_BUS_015
    - 问题：销售组织体系
    - 期望输出：销售团队规模、区域布局、激励机制，报告期各期人均创收、人均创利指标及变化趋势。人均创收、人均创利指标的计算方法及原数字。
    - 输出内容：

    ## ENTRY D_BUS_003
    - 问题：收入区域分布
    - 期望输出：请直接按下列 Markdown 表格结构输出按国内外或其他主要区域划分的收入金额和收入占比。
      | 区域分类 | {FY-3}收入金额 | {FY-3}收入占比 | {FY-2}收入金额 | {FY-2}收入占比 | {FY-1}收入金额 | {FY-1}收入占比 | {FQ-1}收入金额 | {FQ-1}收入占比 | {FQ0/FY0}收入金额 | {FQ0/FY0}收入占比 |
      | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |
      | 国内 |  |  |  |  |  |  |  |  |  |  |
      | 国外 |  |  |  |  |  |  |  |  |  |  |
      | 主要区域1 |  |  |  |  |  |  |  |  |  |  |
      | 主要区域2 |  |  |  |  |  |  |  |  |  |  |
      | 主要区域3 |  |  |  |  |  |  |  |  |  |  |
    - 输出内容：

    ## ENTRY D_BUS_005
    - 问题：前五大客户
    - 期望输出：请直接按下列 Markdown 表格结构输出前五大客户名称、销售金额、收入占比、客户画像、客户类型及客户所在行业。
      | 排名 | 客户名称 | 销售金额 | 收入占比 | 客户画像 | 客户类型 | 所在行业 |
      | --- | --- | --- | --- | --- | --- | --- |
      | 1 |  |  |  |  |  |  |
      | 2 |  |  |  |  |  |  |
      | 3 |  |  |  |  |  |  |
      | 4 |  |  |  |  |  |  |
      | 5 |  |  |  |  |  |  |
    - 输出内容：

    ## ENTRY F_BUS_020
    - 问题：客户变化分析
    - 期望输出：新增主要客户及获客原因。流失的主要客户及流失原因。
    - 输出内容：

    ## ENTRY F_BUS_023
    - 问题：客户转换成本
    - 期望输出：客户转向竞品的难度及成本。
    - 输出内容：

    ## ENTRY F_BUS_026
    - 问题：客户信用
    - 期望输出：对主要客户的信用政策情况：包括信用期限、授信额度；主要客户的平均回款周期及变化，与行业趋势是否一致。
    - 输出内容：

    ## ENTRY D_BUS_006
    - 问题：主要原材料采购
    - 期望输出：请直接按下列 Markdown 表格结构输出主要原材料名称、采购额、采购占比及价格趋势。
      | 原材料名称 | {FY-3}采购额 | {FY-3}采购占比 | {FY-2}采购额 | {FY-2}采购占比 | {FY-1}采购额 | {FY-1}采购占比 | {FQ-1}采购额 | {FQ-1}采购占比 | {FQ0/FY0}采购额 | {FQ0/FY0}采购占比 | 价格趋势 |
      | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |
      | 主要原材料1 |  |  |  |  |  |  |  |  |  |  |  |
      | 主要原材料2 |  |  |  |  |  |  |  |  |  |  |  |
      | 主要原材料3 |  |  |  |  |  |  |  |  |  |  |  |
      | 主要原材料4 |  |  |  |  |  |  |  |  |  |  |  |
      | 主要原材料5 |  |  |  |  |  |  |  |  |  |  |  |
    - 输出内容：

    ## ENTRY F_BUS_034
    - 问题：主要原材料情况
    - 期望输出：主要原材料的主要供应商、市场供给情况、对主要供应商的付款周期及信用安排。
    - 输出内容：

    ## ENTRY D_BUS_007
    - 问题：前五大供应商
    - 期望输出：请直接按下列 Markdown 表格结构输出前五大供应商名称、采购额、采购占比、主要采购产品及供应商类型。
      | 排名 | 供应商名称 | 采购额 | 采购占比 | 主要采购产品 | 供应商类型 |
      | --- | --- | --- | --- | --- | --- |
      | 1 |  |  |  |  |  |
      | 2 |  |  |  |  |  |
      | 3 |  |  |  |  |  |
      | 4 |  |  |  |  |  |
      | 5 |  |  |  |  |  |
    - 输出内容：

    ## ENTRY F_BUS_035
    - 问题：供应链稳定性
    - 期望输出：核心原材料是否有替代来源，关键原材料的安全库存策略，进口原材料的占比及供应链其他风险。
    - 输出内容：

    ## ENTRY F_BUS_036
    - 问题：原材料价格波动
    - 期望输出：主要原材料价格波动对成本的影响。尽可能量化（如价格上涨X%对毛利率的影响）。公司应对原材料价格波动的策略。市场对原材料未来价格的展望
    - 输出内容：

    ## ENTRY D_BUS_008
    - 问题：主要原材料价格趋势
    - 期望输出：主要原材料的采购单价历史及预测。如果有表格或图标，可以进行表格化输出
    - 输出内容：

    ## ENTRY F_BUS_038
    - 问题：生产模式概述
    - 期望输出：自产/外协/代工模式、工艺流程概述。
    - 输出内容：

    ## ENTRY F_BUS_040
    - 问题：生产工艺流程
    - 期望输出：主要产品的生产工艺步骤及关键环节。
    - 输出内容：

    ## ENTRY F_BUS_039
    - 问题：外协/外包情况
    - 期望输出：外协外包的范围、占比及管理。是否存在重要工序外包情况
    - 输出内容：

    ## ENTRY F_BUS_041
    - 问题：生产工艺先进性
    - 期望输出：工艺在行业中的先进程度及改进。
    - 输出内容：

    ## ENTRY F_BUS_042
    - 问题：主要生产基地
    - 期望输出：生产基地位置、面积、功能分工、投资金额。
    - 输出内容：

    ## ENTRY F_BUS_043
    - 问题：主要生产线及核心设备
    - 期望输出：关键生产线及其中的核心设备名称、用途、投产时间、成新率、技术先进性评价。关键生产线指该生产线对公司产品的产能存在决定性影响且难以被外包厂商替代。
    - 输出内容：

    ## ENTRY D_BUS_010
    - 问题：在建产能
    - 期望输出：在建产能项目投资进度。扩产项目的资金来源及融资安排。
    - 输出内容：

    ## ENTRY F_BUS_047
    - 问题：研发模式
    - 期望输出：公司核心技术及产品研发的主要模式。公司主要研发工作如何开展、主要研发目标、研发工作的主要方法。
    - 输出内容：

    ## ENTRY F_BUS_048
    - 问题：核心技术人员
    - 期望输出：核心技术人员的认定标准及名单。核心技术人员的激励情况。核心技术人员的流失风险或传闻。
    - 输出内容：

    ## ENTRY F_BUS_049
    - 问题：核心技术清单
    - 期望输出：核心技术名称、用途、取得方式。如有重大外部技术许可协议及合作研发安排，也一并写出
    - 输出内容：

    ## ENTRY F_BUS_050
    - 问题：技术水平行业对比
    - 期望输出：与竞争对手的技术相比是领先还是落后，或具体哪部分领先哪部分落后。领先或落后的原因分析。
    - 输出内容：

    ## ENTRY F_BUS_051
    - 问题：技术迭代路线图
    - 期望输出：公司技术演进路线及下一代技术方向。
    - 输出内容：

    ## ENTRY F_BUS_052
    - 问题：在研项目清单
    - 期望输出：主要在研项目名称、方向、进展、商业化前景及时间表。
    - 输出内容：

    ## ENTRY F_BUS_055
    - 问题：产品质量问题
    - 期望输出：重大历史产品缺陷历史、召回事件等（如有）。
    - 输出内容：

    ## ENTRY F_BUS_056
    - 问题：特许经营权情况
    - 期望输出：公司主要业务是否存在特许经营情况，特许经营权的取得成本、期限，相关权力是否有最低收益保证。
    - 输出内容：

    ## ENTRY F_BUS_058
    - 问题：重大合同
    - 期望输出：金额非常重大的销售合同、采购合同、战略合作协议、投资合同情况及其履约状态。例如占比公司收入、采购、总资产等核心经营指标超过10%的单一合同。
    - 输出内容：

    ## ENTRY F_BUS_059
    - 问题：中长期战略规划
    - 期望输出：未来3-5年战略方向及目标。战略落地的具体实施步骤和时间表。
    - 输出内容：

    ## ENTRY F_BUS_061
    - 问题：战略资源配置
    - 期望输出：战略执行需要的资金、人才、技术资源。
    - 输出内容：

    ## ENTRY F_BUS_062
    - 问题：并购战略
    - 期望输出：并购方向、标的筛选标准及整合能力。
    - 输出内容：

    ## ENTRY F_BUS_063
    - 问题：融资/募资用途
    - 期望输出：融资的募资用途。
    - 输出内容：

  agent: extract_agent
  output_file: '{file_source_output_path}'
