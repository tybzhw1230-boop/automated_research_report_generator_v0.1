compile_report:
  description: >
    Flow 已经在 {final_report_markdown_path} 预先生成 {company_name} 的最终版 v2 Markdown 研究报告。
    说明：
    - 正文已经由 flow 以确定性方式完成拼装，覆盖最终投资逻辑、尽调问题、7 个 analysis packs、3 个 valuation packs。
    - 附录已经改为 14 份 source md 全文，按专题顺序拼入。

    执行要求：
    - 不要重新生成 Markdown 正文。
    - 不要覆盖或改写 {final_report_markdown_path}。
    - 不得总结、压缩、重写或修补任何上游正文内容。
    - 只做非破坏性确认，确认这份 Markdown 已经准备好交给后续 pitch、snapshot 和 PDF 导出任务。
    - 如果你发现路径为空或描述不完整，只在回答里明确指出，不做内容修复。
  expected_output: |
    Markdown 已确认就绪，可直接生成 pitch material、snapshot PPT 和 PDF。
  agent: report_editor

create_pitch_material:
  description: >
    作为 {company_name} 的推介材料制作人，你需要基于 context 中传入的分析结果，输出一份适合一级半市场、港股 IPO 销售、机构路演和投资沟通场景使用的 Markdown 推介材料。

    该任务只能使用以下 context：
    - investment_thesis_text
    - history_background_pack_text
    - industry_pack_text
    - business_pack_text
    - finance_pack_text
    
    写作要求：
    1. 允许你对 context 内容进行提炼、重组、压缩和口语化改写，使其更适合推介材料传播。
    2. 必须严格基于已有分析结果写作，不得新增任何 context 中没有的事实、数字、估值、时间表、客户名称、市场份额或主观判断。
    3. 允许采用类似示例的风格：标题吸引人、信息密度高、适度使用 emoji 作为段落标识。
    4. 不要写成长篇研究报告，不要照搬最终报告的拼接结构。
    5. 每个模块都应尽量用短段落或编号表达，优先保留最能支持投资判断的信息。
    6. 如果某一模块在 context 中缺乏足够信息，必须明确写“缺乏信息”，不要补写常识。
    7. 只输出 Markdown 内容，不要代码块，不要解释过程，不要 PDF 转换说明。
    8. 输出文件必须是 `{pitch_material_markdown_path}`。

    写作模板1：
      ✨曦智科技——下一代AI光电基础设施探索者
      ⏳【时间表与保荐人】4月14日已通过联交所聆讯，预计5月前发行；中金、国泰海通联席保荐
      📌【概览】
      1.公司专注于提供通過光信號連接各類計算設備（包括GPU、CPU、xPU、交換機及存儲芯片）的綜合解決方案。并积极引领“光計算”产品的产业化路径。公司全球首家实现光电混合算力大规模部署的企业，2025年收入79.2%来自光互连产品；公司亦明确，至少到2027年前，大部分特专科技收入仍将来自光互连。当前外部产业焦点也高度一致：NVIDIA连续把光互连、先进封装和CPO定义为下一阶段AI基础设施的关键能力。
      🌍【行业面】
      1.AI算力新瓶颈的解决方案。AI基础设施的矛盾，正从“有没有算力”转向“算力能不能高效连起来”。招股书口径下，中国Scale-up光互连市场预计将从2025年的57亿元增长到2030年的1805亿元，复合增速99.6%；中国光计算产品市场预计将从2025年的6370万元增长到2030年的14.62亿元，复合增速87.2%。这意味着光互连先放量，光计算后放量，赛道顺序清晰。
      2.产业路线明确。NVIDIA已将CPO和硅光网络推到AI factory主线，Spectrum-X Ethernet Photonics可支撑百万GPU集群，相关产品计划于2026年下半年供货；Marvell则把scale-up、scale-out、scale-across的端到端连接能力作为OFC 2026展示重点。市场现在买的不是概念，而是带宽、功耗、延迟和可靠性。
      🚀【基本面】
      1.公司光互连解决方案用于提升单个服务器或节点内的计算能力(scale-up)，或连接多个独立服务器或节点以形成大型集群(scale-out)。相较于电互连解决方案，光学解决方案延迟更低、带宽更高且能效更高。此外，公司在探索的光计算处理器利用光子线性计算单元加速运算，光芯片受制程的限制较小，具有低时延、高通量等特点，是对电芯片市场的范式变换。
      2.2025年，公司在中国Scale-up光互连整体市场按收入计排名第二；若只看独立供应商，公司排名第一，份额88.3%，也是中国唯一实现大规模商业化的独立Scale-up光互连解决方案供应商。
      3.产品矩阵已从验证走向组合落地。光互连侧，Scale-up EPS于2024年商业化，Scale-up OCS和NexusBench智能收发器于2025年商业化；光计算侧，PACE、OptiHummingbird、Gazelle、PACE 2均已商业化。公司已端到端部署三个千卡GPU集群，与GPU及服务器厂商达成超15项design-in合作；端到端定制流程投入大、难复制，客户锁定能力更强。
      💰【财务面】
      1.2023-2025年收入分别为3823.5万元、6019.1万元和1.0637亿元，同比增长801.3%、57.4%和76.7%；2025年光互连收入8427.7万元，占比79.2%，已是绝对主轴且增速非凡。与此同时，光计算业务在2025年也完成从技术开发服务主导向产品销售主导的切换。
      2.利润表仍在重投入期。2023-2025年毛利率为60.7%、53.5%、39.0%；净利率为-1081.5%、-1221.6%、-1262.0%；研发费用为2.80亿元、3.52亿元、4.79亿元，占收入731.8%、584.9%、450.4%。
      3.但公司现金储备仍有足够的安全边际。公司2025年末现金及等价物2.09亿元，含流动存款及金融资产的现金结余为6.16亿元，按公司口径足够支撑约24个月运营；账面净负债主要来自优先股、可转债等投资者金融工具，上市后将自动转为权益。
      💎【估值面】
      1.公司C3轮投后估值约62.8亿元人民币，C4轮投后估值约78亿元人民币。公司上市预期市值肯定超过80亿港元。对这类18C标的，核心估值锚不是当期利润，而是“商业化斜率+独立卡位+中长期技术期权”。
      2.公司收入高速增长但仍亏损，故PS为公司估值核心指标。近期中际旭创、新易盛、天孚通信、Credo、Marvell、Broadcom的PS（TTM）中位数大概在25x左右。公司收入基数小，增长潜力大，在合理的产业资源引导下，其远期PS倍数将快速缩窄。
      🎯【筹码面】
      1.创始人沈亦晨为董事长兼CEO，最后实际可行日控制34.76%投票权；按18C规则，创始人、核心研发人员及相关持股平台受24个月禁售。三家领航资深独立投资者为Tencent Mobility、上海中移基金、杭州毅鸿，受12个月禁售。明星基金和产业资本的加入将会是中期股价的重要支持。
      🌊【情绪面】
      1.港股对AI和硬科技的承接力，正在重新建立。板块风格上，光通信、OCS、CPO等资产市场估值乐观。Marvell把连接定义为AI数据中心的主要瓶颈；NVIDIA连续与Coherent、Lumentum扩大光学合作，并把光互连与先进封装视为下一阶段AI基础设施的底座。这对曦智科技有利，因为公司当前最扎实的价值共识，正是AI超节点光互连技术。
    写作模板1：
      ✨玉柴船电——AI算力扩容周期下的国产发电发动机龙头
      ⏳【时间表与保荐人】公司已于2026年1月底向联交所提交A1，预计2026年9月发行。招证国际与中国银河联席保荐。
      📌【概览】
      1.玉柴船电是中国领先的发电动力解决方案供应商，按2024年中国发电用发动机销售收入计排名第一，按2024年中国中高速船用发动机销售收入计排名第二；公司覆盖发电用发动机、船用发动机、发电机组及发动机组件，2025年前9个月实现收入49.67亿元、净利润7.62亿元。其从传统的发动机公司开始向“AI数据中心备用电源+大功率国产替代”的受益者转型。
      🌍【行业面】
      1.赛道的核心增量已集中到算力基础设施的电力需求。全球发电用发动机市场2024年约559亿元，2030年预计增至1,438亿元，2024-2030年复合增速17.1%；中国市场2024年约147亿元，2030年预计增至415亿元，复合增速18.9%。其中，数据中心已成为最重要下游，2024年对应市场规模约300亿元，2030年预计达1,018亿元，复合增速22.6%。
      2.更值得看的是结构变化：招股书已明确写到，AIDC机柜功率密度从不足10kW提升至60kW以上，部分场景超过120kW，主流方案正从2MW向3-4MW高功率段升级；外部市场近几个月也持续围绕AI数据中心对电力、站内自备电源和电网容量的挤压进行定价。市场从周期修复，转向需求结构变化。
      🚀【基本面】
      1.公司不是单一品类公司，而是“发电发动机为主、船机为辅、机组和零部件协同”的平台型动力资产。2024年发电用发动机收入30.52亿元，占比76.4%；其中大型发动机收入13.74亿元，占比34.5%，到2025年前9个月进一步升至19.32亿元，占比38.9%。公司的大功率产品增速贴合数据中心场景的增量。
      2.按2024年销售收入，公司在中国发电用发动机市场份额20.2%，排名第一；在中国中高速船用发动机市场份额16.2%，排名第二。与此同时，公司采用“玉柴+mtu”双品牌，销售和服务网络覆盖中国13个区域销售中心及5个海外销售业务分部，拥有超过1,000家授权服务站，海外销售2024年同比增长78.4%。
      3.公司2023年、2024年及2025年前9个月研发开支分别为2.12亿元、2.85亿元和2.66亿元；截至2025年9月30日拥有558项注册专利、133项在审专利申请。2025年10月，公司推出YC16VTF新一代高速高功率发动机，最大额定功率达3,971千瓦，进一步进军高端功率段。
      💰【财务面】
      1.公司业绩开始兑现。2023年收入32.39亿元，2024年增至40.00亿元，同比增长约23.5%；2025年前9个月收入49.67亿元，较上年同期增长约67.4%，已超过2024年全年。同期净利润由2023年的3.96亿元增至2024年的5.36亿元，同比增长约35.3%；2025年前9个月净利润7.62亿元，较上年同期增长约77.8%。
      2.盈利质量改善。公司毛利率由2023年的22.4%提升至2024年的23.4%，2025年前9个月进一步至23.8%；净利率由12.2%提升至13.4%，再升至15.4%。更关键的是，大型发动机毛利率由25.5%升至30.2%，2025年前9个月达到31.5%，反映产品结构在往高功率、高附加值方向走。经营性现金流2025年前9个月净流入8.46亿元，较2024年同期的净流出1,639.8万元明显改善；期末现金及现金等价物16.04亿元。
      3.公司作为制造业企业，资产负债表相对健康。公司资产负债率2023年、2024年及2025年9月末分别为66.7%、64.9%和68.2%，流动比率维持在1.2-1.3，速动比率由0.7提升至1.0。
      💎【估值面】
      1.潍柴动力（2338.HK）P/E Ratio约21.32x，母公司玉柴国际（CYD）约24.51x，康明斯（CMI）约30.04x，卡特彼勒（CAT）约42.05x，潍柴重机（000880.SZ）约53.02x。
      🎯【筹码面】
      1.上市前股权结构非常集中。玉柴股份及其一致行动人持有公司约100%的权益，控股权稳定，公司发行后流通盘也占比较小，流通筹码相对稀缺。
      🌊【情绪面】
      1.“AI算力基础设施背后的电力保障”这条映射在海外公开市场也已经出现：卡特彼勒因AI数据中心带动的电源设备需求，其 Power and Energy 板块成为最大业务；EIA预计美国用电量在2026年和2027年还将续创新高，背后重要驱动之一正是AI与数据中心。也正因如此，市场更容易接受这类资产的“电力韧性+国产替代”叙事。
  expected_output: |
    严格仿照以下信息组织方式输出，但内容必须完全基于 {company_name} 的真实分析结果生成，不得照抄示例中的公司、数据和结论。

    # ✨{company_name}——一句抓人的核心定位标题

    📌【概览】
    公司概览，说明公司在是干什么的、核心竞争力是什么、投资亮点是什么。
    🌍【行业面】
    行业分析，说明行业规模、增长率、趋势、竞争格局等，突出对公司投资吸引力的行业因素。
    🚀【基本面】
    公司基本面分析，说明公司产品结构、技术实力、客户稳定性、管理团队等方面的优势，突出对公司投资吸引力的基本面因素。
    💰【财务面】
    公司财务分析，说明公司收入规模、增长率、盈利能力、现金流、资产负债状况等方面的优势，突出对公司投资吸引力的财务因素。
    💎【估值面】
    公司估值分析，说明公司拟发行估值（如果没有信息就输出【待补】）、相对可比公司的估值位置、为什么现在的估值具备吸引力等。
    🎯【筹码面】
    公司筹码分析，说明公司股权结构、主要股东、机构投资者、IPO分配方案等方面的优势，突出长期投资者对公司股票认可、认购热情高。
    🌊【情绪面】
    公司所处的市场环境分析，说明当前市场环境对公司IPO的影响，为什么现在是投资的好时机等。
    ⏳【时间表】
    公司IPO时间表，说明定基石、提交材料、上市等关键时间节点，如果没有信息就输出【待补】。
    📈【最新业绩】
    公司最新业绩情况，如果没有信息就输出【待补】。

    补充约束：
    - 每个模块2-3个自然段，优先保留数字和判断。
    - 可以使用“全球第三、中国第一”“利润率高”“筹码紧”等短句风格，但必须有 context 支撑。
    - 不要出现“根据上述分析”“如下所示”“本报告认为”这类研究报告口吻。
    - 如果缺乏信心就写“缺乏信息”，不要补写常识。
    - 只输出 Markdown 内容，不要代码块，不要解释过程。
  agent: pitch_material_writer
  output_file: "{pitch_material_markdown_path}"

create_investment_snapshot_ppt:
  description: >
    作为 {company_name} 的投委会单页 PPT 制作人，你的唯一任务是基于 context 中传入的既有分析结果，压缩并生成一份独立的单页投资快照 PPT。

    该任务只能使用以下 context：
    - industry_pack_text
    - business_pack_text
    - finance_pack_text
    - investment_thesis_text
    - risk_pack_text

    绝对约束：
    1. 不得重新读取 PDF，不得调用搜索工具，不得补充任何 context 外的新事实或新数字。
    2. 必须调用 `investment_snapshot_ppt_tool` 一次且仅一次，生成最终 PPTX 文件。
    3. 页面主标题固定为 `机会速览：` {company_name}。
    4. 红色 banner 文案必须使用定位短句形式撰写；定位短句由你从 context 中提炼，以突出公司核心竞争力、强调投资吸引力为原则，必须简洁有力，朗朗上口，字数10字左右。
    5. `overview_summary` 必须是一段约 90 字的摘要，先简单说明公司做什么、为何具备吸引力。
    6. `overview_product_items` 固定 3 条，每条都必须使用 `name` 和 `description` 两个字段；`name` 是产品名称，`description` 是约 30 字的产品定义或用途简介+此类产品的技术或财务亮点。
    7. 财务数据不得由你手工映射为 `financial_rows`；你必须把 `finance_pack_text` 的完整原文原样放入 `financial_source_markdown`，由工具确定性解析。
       - 原样的含义是：不得改写、不得摘录、不得总结、不得缩写、不得只保留表格、不得加解释前缀。
       - 不得把 `finance_pack_text` 包成代码块、JSON 转义字符串、字段说明文本或二次转述内容。
    8. 快照页财务区将固定展示以下 8 个指标：`营业收入`、`营业收入增长率`、`毛利率`、`净利率`、`净利润增长率`、`总资产`、`资产负债率`、`ROE`；若上游缺失，工具会按规则补“缺乏信息”或做有限推导。
    9. `highlight_items` 必须使用 `title` 和 `detail` 两个字段，条数为 3-5 条；每条只表达一个亮点，不得把两个亮点合并到一条里。
    10. `risk_items` 必须使用 `title` 和 `detail` 两个字段，条数为 1-2 条；只要 context 中存在 2 个可独立命名的风险主题，就必须拆成 2 条。
    11. 每条 `risk_items.title` 只能命名一个风险主题，禁止在标题中使用“与、及、和、并且、叠加、/”等连接两个独立风险；每条 `risk_items.detail` 也只能围绕该单一风险展开。
    12. 若某财务指标、亮点或风险在 context 中缺乏明确信息，必须明确填写“缺乏信息”，不得猜测。
    13. 最终输出文件必须是 `{investment_snapshot_ppt_path}`。

    工具调用参数要求：
    - `pptx_path`: `{investment_snapshot_ppt_path}`
    - `slide_title`: 固定写 `投资要点速览`
    - `positioning_line`: 你提炼的一句核心定位
    - `overview_summary`: 约 90 字的公司摘要
    - `overview_product_items`: 使用 `name` 和 `description` 两个字段传入 3 条产品项
    - `financial_source_markdown`: 直接传入 finance_pack_text 的完整输出原文，不得改写、不摘录、不包代码块
    - `highlight_items`: 使用 `title` 和 `detail` 两个字段传入 3-5 条投资亮点。
    - `risk_items`: 使用 `title` 和 `detail` 两个字段传入 1-2 条投资风险，且每条只能对应一个独立风险主题。
    - 如果工具返回 `Error executing tool:`、没有明确返回 PPT 创建成功消息，或 `{investment_snapshot_ppt_path}` 没有生成，则该任务不算完成，必须视为失败。
  expected_output: >
    一条成功消息，明确说明 PPT 已创建于 `{investment_snapshot_ppt_path}`。
  agent: investment_snapshot_slide_writer
export_final_report:
  description: >
    将为 {company_name} 已由 flow 预生成的 Markdown 报告转换成 PDF。
    执行要求：
    - 调用 markdown_to_pdf，并使用 markdown_path={final_report_markdown_path}
    - 使用 pdf_path={final_report_pdf_path}
    - 使用 title={company_name} 买方研究报告
    - 不要修改 Markdown 正文
    - 只做导出，不做内容改写
  expected_output: |
    PDF 已成功导出到：{final_report_pdf_path}
  agent: report_editor
