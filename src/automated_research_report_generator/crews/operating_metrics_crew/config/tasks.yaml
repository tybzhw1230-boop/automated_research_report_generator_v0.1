extract_from_pdf:
  description: |-
    请为 {company_name} 的运营指标分析包生成 File Source Markdown。
    输入：
    - PDF 文件路径：{pdf_file_path}
    - 页码索引路径：{page_index_file_path}
    - 行业分析包文本：{industry_pack_text}
    - 输出路径：{file_source_output_path}

    执行要求：
    - 先读取 PDF 页面索引，再按需读取相关页面。
    - 第一步必须先从 PDF 中提取公司已披露的 operating metrics，不要先空想行业指标。
    - 第二步再根据已提取出的公司指标认知和 `industry_pack_text`，补充该行业其他关键的 operating metrics。
    - 结果至少覆盖 5 个核心 operating metrics；如公司自身披露不足 5 个，用行业关键指标补足，但要明确区分“已披露”和“未披露但应关注”。
    - 严格按照 expected_output 的 ENTRY 结构输出，并保留 entry_id。
    - 只输出 Markdown 正文，不要输出最终 pack。
    - 如果没有信息，也必须保留 entry_id，并明确写“无信息”或“未披露”。
  expected_output: |
    # {company_name} 运营指标分析包 File Source

    ## ENTRY D_OPS_001
    - 问题：公司已披露 operating metrics 提取与整理
    - 期望输出：请直接按下列 Markdown 表格结构，整理公司在 PDF 中已经披露的 operating metrics。优先提取量、价、效率、客户、订单、门店、产能、交付、行业特有 KPI 等指标。表格中的 `FY-3`、`FY-2`、`FY-1`、`FQ0/FY0` 只填真实披露到的期间，没有就写“无信息”或“未披露”。不要新增未来期间列。
    - 输出内容：
      | 指标名称 | 指标口径/定义 | FY-3 | FY-2 | FY-1 | FQ0/FY0 | 单位 | 来源页码 | 备注 |
      | --- | --- | --- | --- | --- | --- | --- | --- | --- |
      | 指标1 |  |  |  |  |  |  |  |  |
      | 指标2 |  |  |  |  |  |  |  |  |
      | 指标3 |  |  |  |  |  |  |  |  |
      | 指标4 |  |  |  |  |  |  |  |  |
      | 指标5 |  |  |  |  |  |  |  |  |

    ## ENTRY D_OPS_002
    - 问题：行业其他关键 operating metrics 补充
    - 期望输出：请根据上一步已提取出的公司指标认知和 `industry_pack_text`，补充该行业还应重点关注的 operating metrics。重点说明为什么这些指标重要、公司是否已经披露、后续可从哪些公开渠道继续跟踪。不要把同行可比公司数据写进这里。
    - 输出内容：
      | 指标名称 | 行业通用性说明 | 为什么重要 | 公司是否已披露 | 可从哪些公开渠道继续跟踪 | 备注 |
      | --- | --- | --- | --- | --- | --- |
      | 行业关键指标1 |  |  | 是/否 |  |  |
      | 行业关键指标2 |  |  | 是/否 |  |  |
      | 行业关键指标3 |  |  | 是/否 |  |  |
      | 行业关键指标4 |  |  | 是/否 |  |  |
      | 行业关键指标5 |  |  | 是/否 |  |  |

  agent: extract_agent
  output_file: "{file_source_output_path}"

search_public_sources:
  description: |-
    请为 {company_name} 的运营指标分析包生成 Search Source Markdown。
    输入：
    - 同行信息 Peer List Source 文本：{peer_info_peer_list_source_text}
    - 输出路径：{search_source_output_path}

    执行要求：
    - 只使用公开资料搜索，不要回到 PDF 原文。
    - 只围绕 `peer_info_peer_list_source_text` 中已经确认的可比公司名称搜索同行 operating metrics。
    - 优先搜索与公司自身经营分析最相关的量、价、效率、客户、订单、门店、产能、交付、行业特有 KPI。
    - 如果满足“至少 2 家可比公司，且至少 1 个指标有 2 个可比较期间”，就按表格整理。
    - 如果数据太稀疏，允许不列表格，但必须明确写出找到的公司、找到的指标、缺失的期间和不能稳健对比的原因。
    - 严格按照 expected_output 的 ENTRY 结构输出，并保留 entry_id。
    - 只输出 Markdown 正文，不要输出最终 pack。
  expected_output: |
    # {company_name} 运营指标分析包 Search Source

    ## ENTRY D_OPS_003
    - 问题：同行可比 operating metrics 搜索与整理
    - 期望输出：如果可比数据足够，请直接按下列 Markdown 表格结构整理同行 operating metrics。优先列出与公司最核心的经营指标口径最接近的数据。不要新增未来期间列。
    - 输出内容：
      | 指标名称 | 公司名称 | FY-2 | FY-1 | FQ0/FY0 | 单位 | 来源 | 备注 |
      | --- | --- | --- | --- | --- | --- | --- | --- |
      | 指标1 | 可比公司1 |  |  |  |  |  |  |
      | 指标1 | 可比公司2 |  |  |  |  |  |  |
      | 指标2 | 可比公司1 |  |  |  |  |  |  |
      | 指标2 | 可比公司2 |  |  |  |  |  |  |

    ## ENTRY D_OPS_004
    - 问题：同行可比数据充分性与缺口
    - 期望输出：请说明同行 operating metrics 是否足够支撑稳健对比。如果数据不足，不要强行补表，而要明确写清楚样本数量、缺失期间、口径差异和当前不能得出稳健结论的原因。
    - 输出内容：
      - 样本公司：
      - 已找到的核心指标：
      - 缺失的关键期间或口径：
      - 当前是否足以列表对比：是 / 否
      - 原因说明：

  agent: search_agent
  output_file: "{search_source_output_path}"

analyze_operating_metrics:
  description: |-
    请基于 {company_name} 当前专题的两份 source md、业务分析和行业分析，生成运营指标分析中间产物。
    输入：
    - File Source：{file_source_output_path}
    - Search Source：{search_source_output_path}
    - 业务分析包文本：{business_pack_text}
    - 行业分析包文本：{industry_pack_text}
    - PDF 文件路径：{pdf_file_path}
    - 页码索引路径：{page_index_file_path}
    - 输出路径：{operating_metrics_analysis_output_path}

    执行要求：
    - 先读 File Source，确认公司自身已经披露了哪些指标、行业还应关注哪些指标。
    - 再读 Search Source，确认同行有哪些指标可以比较、哪些口径或期间不足以比较。
    - 最后结合 `business_pack_text` 和 `industry_pack_text`，按同一组核心 operating metrics 解释公司自身趋势、同行相对位置以及与业务逻辑的一致性。
    - 明确区分事实、解释和待确认事项。
    - 如果需要回读 PDF，只能用于解释已有指标，不要扩展新的搜索边界。
    - 最终只输出 Markdown 正文。
  expected_output: |
    # {company_name} 运营指标分析中间产物

    ## 1. 核心 operating metrics 与口径边界
    - 写明当前分析真正采用的核心 operating metrics 清单。
    - 明确哪些指标来自公司已披露，哪些指标来自行业关键补充，哪些指标有口径限制。

    ## 2. 公司 operating metrics 趋势分析
    - 结合时间序列说明公司核心指标的变化方向、变化强度和可能原因。

    ## 3. 同行业可比指标对比分析
    - 只分析已有可比数据支持的指标。
    - 数据不足时，要明确写“证据不足”，不要硬下结论。

    ## 4. operating metrics 与业务/行业逻辑的一致性分析
    - 说明经营指标变化是否与业务模式、竞争格局、行业阶段一致。

    ## 5. 关键缺口与未确认信息
    - 列出对投资判断影响较大的缺口、冲突点和待确认事项。

  agent: operating_metrics_analysis_agent
  output_file: "{operating_metrics_analysis_output_path}"

synthesize_and_output:
  crew_name: operating_metrics_crew
  pack_name: operating_metrics_pack
  pack_title: 运营指标分析包
  description: |-
    请基于 {company_name} 当前专题的三份中间产物，输出最终运营指标分析包。
    输入：
    - File Source：{file_source_output_path}
    - Search Source：{search_source_output_path}
    - Operating Metrics Analysis：{operating_metrics_analysis_output_path}
    - 输出路径：{pack_output_path}

    执行要求：
    - 只基于三份上游产物进行综合。
    - 先列表格，再接分析，让每段分析都能追溯到具体数据。
    - 对缺失、冲突、稀疏数据要显式写边界。
    - 不新增新的事实，不扩展新的搜索边界，不重做口径发明。
    - 最终只输出 Markdown 正文。
  expected_output: |
    # {company_name} 运营指标分析
    ## 1. 核心 operating metrics 定义与口径
    - 列出本次分析最终采用的核心 operating metrics 及其定义边界。

    ## 2. 公司已披露 operating metrics 总表
    - 直接列出 File Source 中公司已披露指标的核心表格。

    ## 3. 行业关键 operating metrics 补充清单
    - 直接列出 File Source 中“行业其他关键 operating metrics 补充”表格。

    ## 4. 同行业可比 operating metrics 对比
    - 如同行数据充分，列出 Search Source 中的同行表格。
    - 如同行数据不足，明确说明为何不能稳健列表对比。

    ## 5. 公司 operating metrics 趋势分析
    - 结合中间分析产物，解释公司自身经营指标变化。

    ## 6. 同行业对比下的相对位置与原因
    - 结合中间分析产物，解释公司与同行的差异来源。

    ## 7. 关键缺口与待确认事项
    - 汇总当前运营指标分析里最重要的缺口、冲突点和待确认事项。

  agent: synthesizing_agent
  output_file: "{pack_output_path}"
