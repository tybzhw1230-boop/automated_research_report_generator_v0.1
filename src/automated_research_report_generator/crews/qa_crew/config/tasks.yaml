review_question_coverage:
  description: >
    审查 {company_name} 在 {stage_name} 阶段的问题覆盖情况，并指出需要定向重跑的 pack。

    输入：
    - 阶段重点：
      {stage_focus}
    - 问题树：
      {question_tree_text}
    - 注册表 Markdown 视图：
      {registry_markdown_text}
    - 注册表增量变化摘要：
      {registry_diff_text}
    - 阶段分析包集合：
      {stage_pack_bundle_text}
    - PDF 文件路径：{pdf_file_path}
    - 页面索引文件路径：{page_index_file_path}

    执行要求：
    - 必须先通读 Markdown 视图和增量摘要，再做判断。
    - 如果需要核对具体 entry 或 evidence，使用 `read_registry` 工具，优先使用 `view="markdown"` 或按需钻取详情。
    - 必须判断当前阶段是否已经足够覆盖目标问题，从而可以继续推进。
    - 必须重点关注缺失的问题覆盖、证据缺口、未解决的新发现事项，以及跨 pack 不一致。
    - `affected_packs` 只填写需要定向重跑的 pack 名，如 `business_pack`、`peer_info_pack`。
    - 只输出合法 JSON，字段固定为 `status`、`summary`、`key_gaps`、`priority_actions`、`affected_packs`。
    - `status` 只能是 `pass`、`revise`、`stop` 之一。
    - 不得输出 Markdown、代码块或额外说明。
  expected_output: |
    {
      "status": "pass | revise | stop",
      "summary": "一句到几句总结，说明当前阶段覆盖是否足够。",
      "key_gaps": [
        "缺口 1",
        "缺口 2"
      ],
      "priority_actions": [
        "动作 1",
        "动作 2"
      ],
      "affected_packs": [
        "business_pack",
        "peer_info_pack"
      ]
    }
  agent: coverage_reviewer
  output_file: "{qa_output_dir}/01_{stage_name}_coverage_review.json"
