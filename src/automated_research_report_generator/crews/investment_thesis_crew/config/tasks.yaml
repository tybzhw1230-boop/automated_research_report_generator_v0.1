build_bull_case:
  description: |-
    基于 {company_name} 的研究、估值和尽调问题，输出激进视角的 bullish case。
    输入：
    - 历史与背景分析包：{history_background_pack_text}
    - 行业分析包：{industry_pack_text}
    - 业务分析包：{business_pack_text}
    - 同行信息分析包：{peer_info_pack_text}
    - 财务分析包：{finance_pack_text}
    - 运营指标分析包：{operating_metrics_pack_text}
    - 风险分析包：{risk_pack_text}
    - 可比估值分析包：{peers_pack_text}
    - 内在价值分析包：{intrinsic_value_pack_text}
    - 综合估值分析包：{valuation_pack_text}
    - 尽调问题包：{diligence_questions_text}
    - 历史与背景原始材料：{history_background_file_source_text}
    - 行业原始材料：{industry_file_source_text}
    - 行业外部补充材料：{industry_search_source_text}
    - 业务原始材料：{business_file_source_text}
    - 同行数据材料：{peer_info_peer_data_source_text}
    - 财务原始材料：{finance_file_source_text}
    - 财务计算补齐材料：{finance_computed_metrics_text}
    - 运营指标原始材料：{operating_metrics_file_source_text}
    - 风险原始材料：{risk_file_source_text}
    - 风险外部补充材料：{risk_search_source_text}

    通用写法规则：
    - 只输出激进视角，不要提前替 bear 或 neutral 辩护。
    - 每一节都不能只写 1 句空泛判断，必须围绕 4 个商业问题展开：公司靠什么产品或服务挣钱、当前挣钱能力怎么样、这种钱还能挣多久、哪个风险最可能把这套逻辑打断。
    - 证据表达统一使用“材料名 + 事实 + 商业含义”，例如“业务分析包显示……；财务分析包显示……；这说明……”。禁止输出 `ENTRY F_xxx / D_xxx / S_xxx`。
    - 事实优先引用原始材料与补充材料，其次才引用 pack。若某份 source 为空，允许退回引用对应 pack，但禁止伪造“原始材料显示”。
    - 遇到行业术语、财务缩写、技术名词，首次出现必须括号解释，例如 `ASP（平均售价）`。
    - 禁止直接堆“护城河、赛道、卡位、降维打击、时间期权、估值修复”等词而不给事实解释。若确需使用，后面必须立即解释具体事实。
    - 如果 source 与 pack 都没有足够事实，明确写“缺乏信息”，不要补口号。

    各节固定要求：
    - `## 1. 核心看多结论`：先用 1 段交代主营业务、主要客户/场景、行业位置、市场地位和核心竞争优势，再用 1 段给出看多判断。这一节必须回答“公司怎么挣钱、能不能继续挣钱”。
    - `## 2. 最强支撑证据`：固定写 3-5 条，每条都必须带材料名、事实和商业含义。
    - `## 3. 估值承接判断`：不允许只写“估值错配”或“估值有吸引力”，必须把估值判断和收入、利润、现金流、资产质量或运营指标挂钩。
    - `## 4. 最关键催化剂`：只写会改变商业结果的具体触发，不写泛泛市场情绪。
    - `## 5. 最脆弱假设`：明确这套立场最怕什么事实不成立，并说明为什么一旦不成立会伤到“怎么挣钱、钱挣得多不多、能挣多久”。
    - `## 6. 最可能改变此立场的尽调问题`：固定点 1-2 个问题。每个问题都必须绑定一条具体假设或证据缺口，并写清什么回答会削弱或推翻 bullish case。
  expected_output: |
    严格按以下模板输出，不增删标题。
    # {company_name} Bull Case
    ## 1. 核心看多结论
    ## 2. 最强支撑证据
    ## 3. 估值承接判断
    ## 4. 最关键催化剂
    ## 5. 最脆弱假设
    ## 6. 最可能改变此立场的尽调问题
  agent: bull_agent
  output_file: "{thesis_output_dir}/01_bull_thesis.md"

build_neutral_case:
  description: |-
    基于 {company_name} 的研究、估值和尽调问题，输出中立视角的 base case。
    输入：
    - 历史与背景分析包：{history_background_pack_text}
    - 行业分析包：{industry_pack_text}
    - 业务分析包：{business_pack_text}
    - 同行信息分析包：{peer_info_pack_text}
    - 财务分析包：{finance_pack_text}
    - 运营指标分析包：{operating_metrics_pack_text}
    - 风险分析包：{risk_pack_text}
    - 可比估值分析包：{peers_pack_text}
    - 内在价值分析包：{intrinsic_value_pack_text}
    - 综合估值分析包：{valuation_pack_text}
    - 尽调问题包：{diligence_questions_text}
    - 历史与背景原始材料：{history_background_file_source_text}
    - 行业原始材料：{industry_file_source_text}
    - 行业外部补充材料：{industry_search_source_text}
    - 业务原始材料：{business_file_source_text}
    - 同行数据材料：{peer_info_peer_data_source_text}
    - 财务原始材料：{finance_file_source_text}
    - 财务计算补齐材料：{finance_computed_metrics_text}
    - 运营指标原始材料：{operating_metrics_file_source_text}
    - 风险原始材料：{risk_file_source_text}
    - 风险外部补充材料：{risk_search_source_text}

    通用写法规则：
    - 重点不是折中表态，而是先把事实讲清楚，再给条件化判断。
    - 每一节都不能只写 1 句空泛判断，必须围绕 4 个商业问题展开：公司靠什么挣钱、当前挣钱能力怎么样、这种钱还能挣多久、哪个风险最可能把这套逻辑打断。
    - 证据表达统一使用“材料名 + 事实 + 商业含义”。禁止输出 `ENTRY F_xxx / D_xxx / S_xxx`。
    - 事实优先引用原始材料与补充材料，其次才引用 pack。若某份 source 为空，允许退回引用对应 pack，但禁止伪造“原始材料显示”。
    - 遇到行业术语、财务缩写、技术名词，首次出现必须括号解释。
    - 不要使用故作高深的资本市场腔，不要把中立写成空泛折中。没有事实支持时直接写“缺乏信息”。

    各节固定要求：
    - `## 1. 核心中立结论`：先用 1 段交代主营业务、客户/场景、行业位置、市场地位、竞争优势和当前财务状态，再用 1 段给出当前更合理的中立或偏向判断。
    - `## 2. 当前最强支撑证据`：固定写 3-5 条，每条都必须带材料名、事实和商业含义。
    - `## 3. 当前更合理的估值承接判断`：必须把估值判断和收入、利润、现金流、资产质量或运营指标挂钩，不允许只写“估值中性”。
    - `## 4. 最关键的分歧触发点`：只写会改变商业结果或承接区间的具体触发，不写泛泛市场情绪。
    - `## 5. 最脆弱假设`：明确当前判断最怕哪条事实不成立，并说明为什么一旦不成立会伤到“怎么挣钱、钱挣得多不多、能挣多久”。
    - `## 6. 最可能改变此立场的尽调问题`：固定点 1-2 个问题。每个问题都必须绑定一条具体分歧假设，并写清什么回答会把 neutral case 推向 bull 或 bear。
  expected_output: |
    严格按以下模板输出，不增删标题。
    # {company_name} Neutral Case
    ## 1. 核心中立结论
    ## 2. 当前最强支撑证据
    ## 3. 当前更合理的估值承接判断
    ## 4. 最关键的分歧触发点
    ## 5. 最脆弱假设
    ## 6. 最可能改变此立场的尽调问题
  agent: neutral_agent
  output_file: "{thesis_output_dir}/02_neutral_thesis.md"

build_bear_case:
  description: |-
    基于 {company_name} 的研究、估值和尽调问题，输出保守视角的 bearish case。
    输入：
    - 历史与背景分析包：{history_background_pack_text}
    - 行业分析包：{industry_pack_text}
    - 业务分析包：{business_pack_text}
    - 同行信息分析包：{peer_info_pack_text}
    - 财务分析包：{finance_pack_text}
    - 运营指标分析包：{operating_metrics_pack_text}
    - 风险分析包：{risk_pack_text}
    - 可比估值分析包：{peers_pack_text}
    - 内在价值分析包：{intrinsic_value_pack_text}
    - 综合估值分析包：{valuation_pack_text}
    - 尽调问题包：{diligence_questions_text}
    - 历史与背景原始材料：{history_background_file_source_text}
    - 行业原始材料：{industry_file_source_text}
    - 行业外部补充材料：{industry_search_source_text}
    - 业务原始材料：{business_file_source_text}
    - 同行数据材料：{peer_info_peer_data_source_text}
    - 财务原始材料：{finance_file_source_text}
    - 财务计算补齐材料：{finance_computed_metrics_text}
    - 运营指标原始材料：{operating_metrics_file_source_text}
    - 风险原始材料：{risk_file_source_text}
    - 风险外部补充材料：{risk_search_source_text}

    通用写法规则：
    - 只输出保守视角，不要为了平衡而主动补充 bullish case。
    - 每一节都不能只写 1 句空泛判断，必须围绕 4 个商业问题展开：公司靠什么挣钱、当前挣钱能力怎么样、这种钱还能挣多久、哪个风险最可能把这套逻辑打断。
    - 证据表达统一使用“材料名 + 事实 + 商业含义”。禁止输出 `ENTRY F_xxx / D_xxx / S_xxx`。
    - 事实优先引用原始材料与补充材料，其次才引用 pack。若某份 source 为空，允许退回引用对应 pack，但禁止伪造“原始材料显示”。
    - 遇到行业术语、财务缩写、技术名词，首次出现必须括号解释。
    - 禁止把风险写成情绪化修辞。没有事实支持时直接写“缺乏信息”。

    各节固定要求：
    - `## 1. 核心看空结论`：先用 1 段交代主营业务、客户/场景、行业位置、市场地位和当前财务状态，再用 1 段指出哪一环最可能断掉，从而伤到盈利持续性。
    - `## 2. 最强支撑证据`：固定写 3-5 条，每条都必须带材料名、事实和商业含义。
    - `## 3. 估值最脆弱的部分`：必须把估值脆弱性和收入、利润、现金流、资产质量或运营指标挂钩，不允许只写“估值偏贵”。
    - `## 4. 最关键的风险触发点`：只写会改变商业结果的具体触发，不写泛泛市场情绪。
    - `## 5. 最脆弱假设或证据缺口`：明确 bear case 最依赖哪条风险假设或事实缺口，并说明它为什么会伤到“怎么挣钱、钱挣得多不多、能挣多久”。
    - `## 6. 最可能改变此立场的尽调问题`：固定点 1-2 个问题。每个问题都必须绑定一条具体风险假设或证据缺口，并写清什么回答会明显削弱或推翻 bear case。
  expected_output: |
    严格按以下模板输出，不增删标题。
    # {company_name} Bear Case
    ## 1. 核心看空结论
    ## 2. 最强支撑证据
    ## 3. 估值最脆弱的部分
    ## 4. 最关键的风险触发点
    ## 5. 最脆弱假设或证据缺口
    ## 6. 最可能改变此立场的尽调问题
  agent: bear_agent
  output_file: "{thesis_output_dir}/03_bear_thesis.md"

synthesize_final_investment_case:
  description: |-
    综合 {company_name} 的 bull / neutral / bear 三个立场，输出最终投资论点。
    你同时可以使用：
    - bull / neutral / bear 三份立场稿
    - 历史与背景分析包：{history_background_pack_text}
    - 行业分析包：{industry_pack_text}
    - 业务分析包：{business_pack_text}
    - 同行信息分析包：{peer_info_pack_text}
    - 财务分析包：{finance_pack_text}
    - 运营指标分析包：{operating_metrics_pack_text}
    - 风险分析包：{risk_pack_text}
    - 可比估值分析包：{peers_pack_text}
    - 内在价值分析包：{intrinsic_value_pack_text}
    - 综合估值分析包：{valuation_pack_text}
    - 尽调问题包：{diligence_questions_text}
    - 历史与背景原始材料：{history_background_file_source_text}
    - 行业原始材料：{industry_file_source_text}
    - 行业外部补充材料：{industry_search_source_text}
    - 业务原始材料：{business_file_source_text}
    - 同行数据材料：{peer_info_peer_data_source_text}
    - 财务原始材料：{finance_file_source_text}
    - 财务计算补齐材料：{finance_computed_metrics_text}
    - 运营指标原始材料：{operating_metrics_file_source_text}
    - 风险原始材料：{risk_file_source_text}
    - 风险外部补充材料：{risk_search_source_text}

    执行要求：
    - 写成“投资经理给内部同事的商业判断 memo”，不是研究员炫技文章。
    - 先识别三方共识，再识别核心分歧；先复原事实，再收束判断。
    - 证据表达继续使用“材料名 + 事实 + 商业含义”，不要输出 `ENTRY F_xxx / D_xxx / S_xxx`。
    - 若某份 source 为空，允许退回引用对应 pack，但禁止伪造“原始材料显示”。
    - 遇到行业术语、财务缩写、技术名词，首次出现必须括号解释。
    - 不要简单投票式汇总，必须体现证据权重、分歧来源和商业第一性问题：怎么挣钱、钱挣得多不多、能挣多久、主要风险是什么。

    各节固定要求：
    - `## 1. 机会简述`：“一句话结论”+“1 段交代主营业务、客户/场景、行业位置、市场地位和当前财务状态的事实性描述”。
    - `## 2. 投资亮点`：固定 3-4 条。每条都要先写事实，再写为什么它能带来赚钱能力或持续性。
    - `## 3. 投资风险总结`：固定 3-4 条。每条都要落到会怎么伤害收入、利润、现金流、估值或上市进程。
    - `## 4. 多头/中立/空头三方共识`：先写共同认可的事实，不先写观点。至少覆盖主营业务、行业位置、市场地位、竞争优势、当前财务状态。
    - `## 5. 多头/中立/空头核心分歧`：分歧必须写成“哪条假设不同，哪边材料更支持哪种解释”。
    - `## 6. 证据权重判断`：用高/中/低或强/中/弱做证据权重，但每条都必须说明为什么。
    - `## 7. 当前更接近哪一类结论`：明确给出当前判断，并把理由归结到 4 个商业问题。
    - `## 8. 仍需验证的关键问题`：只写最影响当前判断的关键问题，不写泛泛愿望清单。
    - `## 9. 什么条件下应升级判断`：必须写成业务、财务、竞争、合规层面的具体触发。
    - `## 10. 什么条件下应下调判断`：必须写成业务、财务、竞争、合规层面的具体触发。
  expected_output: |
    严格按以下模板输出，不增删标题。
    # {company_name} 投资逻辑
    ## 1. 一句话结论
    ## 2. 投资亮点
    ## 3. 投资风险总结
    ## 4. 多头/中立/空头三方共识
    ## 5. 多头/中立/空头核心分歧
    ## 6. 证据权重判断
    ## 7. 当前更接近哪一类结论
    ## 8. 仍需验证的关键问题
    ## 9. 什么条件下应升级判断
    ## 10. 什么条件下应下调判断
  agent: thesis_synthesizer
  output_file: "{thesis_output_dir}/04_investment_thesis.md"
