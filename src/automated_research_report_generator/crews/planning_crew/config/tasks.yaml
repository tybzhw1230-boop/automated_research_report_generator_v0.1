define_research_scope:
  description: >
    为 {industry} 行业中的 {company_name} 规划第一版买方研究范围。

    输入：
    - PDF 文件路径：{pdf_file_path}
    - 页面索引文件路径：{page_index_file_path}
    - 文档画像摘要：
      {document_profile_summary}
    执行要求：
    - 研究范围必须围绕投资决策问题组织，而不是围绕报告章节堆砌内容。
    - 必须明确区分哪些问题应由 research、valuation、investment thesis、QA 各阶段分别处理。
    - 范围要务实、紧凑、可执行，不要提前回答整份报告的结论。
    - 必须指出当前最值得优先验证的未知点、冲突点和证据缺口。
    - 不得输出空泛口号式内容，不得写成泛行业模板。
  expected_output: |
    严格按以下模板输出，不增删标题。

    # {company_name} 研究范围说明
    ## 1. 研究目标
    - 本轮研究要支持什么投资判断
    - 本轮研究不打算解决什么问题

    ## 2. 核心决策问题
    - 问题 1
    - 问题 2
    - 问题 3

    ## 3. 阶段分工
    - Research 阶段负责：
    - Valuation 阶段负责：
    - Investment Thesis 阶段负责：
    - QA 阶段负责：

    ## 4. 当前最高优先级未知点
    - 未知点 1
    - 未知点 2
    - 未知点 3

    ## 5. 暂不纳入本轮范围的事项
    - 事项 1
    - 事项 2
  agent: research_planner
  output_file: "{planning_output_dir}/01_research_scope.md"

seed_question_tree:
  description: >
    基于当前研究范围和证据注册表，为 {company_name} 生成第一版问题树。

    输入：
    - 研究范围说明：
      使用 define_research_scope 的输出作为上游上下文
    - PDF 文件路径：{pdf_file_path}
    - 页面索引文件路径：{page_index_file_path}
    执行要求：
    - 问题树必须围绕投资逻辑组织，不得简单复述报告章节标题。
    - 必须区分 L1 核心问题与 L2 追问问题。
    - 必须标注哪些问题已部分被覆盖，哪些仍未解决。
    - 必须给下游团队保留继续补充新子问题的空间。
    - 问题表述要简短、可验证、可继续拆解。
  expected_output: |
    严格按以下模板输出，不增删标题。

    # {company_name} 问题树
    ## 1. L1 核心问题
    - L1-1：
    - L1-2：
    - L1-3：
    - L1-4：

    ## 2. L2 追问问题
    - 针对 L1-1：
      - L2-1：
      - L2-2：
    - 针对 L1-2：
      - L2-1：
      - L2-2：

    ## 3. 当前已覆盖问题
    - 已覆盖问题 1
    - 已覆盖问题 2

    ## 4. 当前未解决问题
    - 未解决问题 1
    - 未解决问题 2
    - 未解决问题 3

    ## 5. 建议下游新增跟踪的问题
    - 建议问题 1
    - 建议问题 2
  agent: research_planner
  output_file: "{planning_output_dir}/02_question_tree.md"

seed_registry_judgments:
  description: >
    基于研究范围和问题树，为 {company_name} 生成一组可直接写入 registry 的结构化 entries。

    输入：
    - 研究范围说明：
      使用 define_research_scope 的输出作为上游上下文
    - 问题树：
      使用 seed_question_tree 的输出作为上游上下文

    执行要求：
    - 允许输出 `fact`、`data`、`judgment` 三类 entry，但不要只写 judgment。
    - judgment 类型必须是“可以被证据支持或反驳的判断句”，不要写成问题句。
    - judgment 要具体、可区分、可验证，避免“大而全”的综合判断。
    - 必须为每个 target_pack 先搭出最小 skeleton，优先覆盖 research 的 7 个 pack，总量控制在 30-50 条。
    - 每个 target_pack 的最小 entry 数量如下：
      - history_background_pack: 3-5 fact + 2-3 judgment
      - industry_pack: 3-5 data + 2-3 judgment
      - business_pack: 5-8 data + 3-5 judgment
      - peer_info_pack: 3-5 data + 2-3 judgment
      - finance_pack: 8-12 data + 3-5 judgment，且必须覆盖收入/毛利率/EBITDA/净利润/FCF/负债率/利息覆盖/应收周转/存货周转
      - operating_metrics_pack: 3-5 data + 1-2 judgment
      - risk_pack: 2-3 fact + 3-5 judgment
    - `entry_id` 必须遵守统一命名规则：
      - fact: `F_{pack缩写}_{三位序号}`，例如 `F_HIS_001`
      - data: `D_{pack缩写}_{三位序号}`，例如 `D_FIN_001`
      - judgment: `J_{pack缩写}_{三位序号}`，例如 `J_BUS_001`
      - pack 缩写映射：HIS=history_background，IND=industry，BUS=business，PEER=peer_info，FIN=finance，OPS=operating_metrics，RISK=risk
    - content 要优先写具体判断、具体事实或数据定义，不要写泛化口号。
    - evidence_needed 只写后续需要什么证据，不要把分析过程写进去。
    - owner_crew 可以使用 planning_crew、research_crew、valuation_crew 以及 research 子 crew 名称。
    - target_pack 只能使用 history_background_pack、industry_pack、business_pack、peer_info_pack、finance_pack、operating_metrics_pack、risk_pack、peers_pack、intrinsic_value_pack。
    - 如果输出 `data` 类型，必须填写 `value="待补"`，并尽量补 `unit`、`period`、`calibration_note`。
  expected_output: |
    输出必须是结构化 JSON，对应 RegistrySeedPlan 模型。
    summary 写本轮 entry seed 的一句话摘要。
    entries 数组中的每一项都必须包含：
    - entry_id
    - entry_type
    - title
    - content
    - target_pack
    - evidence_needed
    - owner_crew
    - entry_level
    - priority
    - next_action
  agent: research_planner

seed_evidence_map:
  description: >
    结合研究范围、问题树、结构化 judgments 和页码索引，为 {company_name} 生成第一版证据地图。

    输入：
    - 研究范围说明：
      使用 define_research_scope 的输出作为上游上下文
    - 问题树：
      使用 seed_question_tree 的输出作为上游上下文
    - 结构化 judgments：
      使用 seed_registry_judgments 的输出作为上游上下文
    - PDF 文件路径：{pdf_file_path}
    - 页面索引文件路径：{page_index_file_path}
    执行要求：
    - 必须按 judgment 维度整理现有证据，而不是按材料来源简单罗列。
    - 必须指出每条关键 judgment 当前最相关的已知证据、缺口和建议后续动作。
    - 建议动作要明确区分“继续读 PDF”还是“继续外部搜索”。
    - 输出结构要与 v2 各分析包的后续使用方式兼容。
  expected_output: |
    严格按以下模板输出，不增删标题。

    # {company_name} 证据地图
    ## 1. Judgment 与现有证据对应关系
    | Judgment | 当前已知证据 | 主要来源 | 证据强度 | 备注 |
    | --- | --- | --- | --- | --- |
    | Judgment 1 |  |  |  |  |
    | Judgment 2 |  |  |  |  |
    | Judgment 3 |  |  |  |  |

    ## 2. 主要证据缺口
    - 缺口 1
    - 缺口 2
    - 缺口 3

    ## 3. 建议后续动作
    | Judgment | 建议动作 | 动作类型（继续读 PDF/外部搜索/后续复核） | 原因 |
    | --- | --- | --- | --- |
    | Judgment 1 |  |  |  |
    | Judgment 2 |  |  |  |
    | Judgment 3 |  |  |  |
  agent: research_planner
  output_file: "{planning_output_dir}/03_evidence_map_seed.md"
