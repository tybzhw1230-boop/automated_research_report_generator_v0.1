      | 金额 | 营业利润 |  |  |  |  |  |
      | 金额 | 所得税 |  |  |  |  |  |
      | 金额 | 净利润 |  |  |  |  |  |
      | 金额 | 归母净利润 |  |  |  |  |  |
      | 金额 | EBITDA |  |  |  |  |  |
      | 金额 | EBIT |  |  |  |  |  |
      | 利润率 | 毛利率 |  |  |  |  |  |
      | 利润率 | 销售费用率 |  |  |  |  | 待计算或直接披露 |
      | 利润率 | 管理费用率 |  |  |  |  | 待计算或直接披露 |
      | 利润率 | 研发费用率 |  |  |  |  | 待计算或直接披露 |
      | 利润率 | 财务费用率 |  |  |  |  | 待计算或直接披露 |
