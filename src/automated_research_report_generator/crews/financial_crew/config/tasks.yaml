analyze_financial_performance:
  description: |-
    请基于 {company_name} 当前专题的计算结果、行业分析、业务分析和 PDF 原文，生成财务分析结果。
    输入：
    - 计算结果：{finance_computed_metrics_output_path}
    - 行业分析包文本：{industry_pack_text}
    - 业务分析包文本：{business_pack_text}
    - PDF 文件路径：{pdf_file_path}
    - 页面索引路径：{page_index_file_path}
    - 输出路径：{finance_analysis_output_path}

    执行要求：
    - 先看计算结果，确定需要解释的年份变化和同行差异。
    - 再回读 PDF 的管理层讨论、报表附注、收入结构、成本说明、减值说明、资本开支与融资说明等位置寻找原因证据。
    - 最后结合行业发展和业务逻辑，解释：
      1. 公司各年核心财务指标变化原因
      2. 公司与同行中位数、平均数差异原因
    - 明确区分事实、解释和仍待确认项。
    - 最终只输出 Markdown 正文。
  expected_output: |
    # {company_name} 财务分析包 Financial Analysis

    ## 1. 盈利能力变化原因分析
    - 写明毛利率、营业利润率、净利率、ROE、ROIC 等指标的年度变化原因。

    ## 2. 收入、成本与费用结构变化原因分析
    - 写明收入结构、成本结构、销售费用、管理费用、研发费用、财务费用变化原因。

    ## 3. 现金流与营运资本变化原因分析
    - 写明经营现金流、应收、存货、应付及周转类指标变化原因。

    ## 4. 资产负债与资本结构变化原因分析
    - 写明资产负债率、有息负债率、流动比率、速动比率等变化原因。

    ## 5. 公司与同行差异原因分析
    - 结合行业和业务逻辑，解释公司与同行中位数、平均数的差异原因。

    ## 6. 财务综合判断与估值含义
    - 汇总财务优势、财务风险以及对估值输入的影响。
  agent: financial_analysis_agent
  output_file: "{finance_analysis_output_path}"

