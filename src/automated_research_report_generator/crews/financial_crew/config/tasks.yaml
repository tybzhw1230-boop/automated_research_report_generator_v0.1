      | 衍生指标 | 自由现金流FCFE |  |  |  |  | 待计算或直接披露 |

    ## ENTRY D_FIN_007
    - 问题：综合财务比率
    - 期望输出：请直接按下列 Markdown 表格结构输出综合财务比率。固定覆盖盈利能力、资本结构、偿债能力、营运能力四类指标。不得新增未来期间列。
      口径要求：
      - ROE：`归母净利润 / 平均归母股东权益`。平均归母股东权益优先按 `(期初归母股东权益 + 期末归母股东权益) / 2`。
      - ROIC：优先按 `税后经营利润 NOPAT / 平均投入资本`。其中 `NOPAT = EBIT × (1 - 实际所得税率)`；平均投入资本优先按 `平均(有息负债 + 归母股东权益 + 少数股东权益 - 货币资金 - 交易性金融资产)`，若部分字段缺失，可退化为 `平均(有息负债 + 所有者权益)`，并在备注说明。
      - ROA：`净利润 / 平均总资产`。若公司或行业惯例使用“归母净利润 / 平均总资产”，可沿用披露口径，但必须在备注写明。
      - 资产负债率：`总负债 / 总资产`。
      - 有息负债率：`有息负债 / 总资产`。有息负债至少包括短期借款、一年内到期非流动负债、长期借款、应付债券、租赁负债、长期应付款中的有息部分。
      - 流动比率：`流动资产 / 流动负债`。
      - 速动比率：`(流动资产 - 存货 - 预付款项 - 合同资产中变现较慢部分) / 流动负债`。若无法细分合同资产，至少按 `(流动资产 - 存货 - 预付账款) / 流动负债`，并在备注说明。
      - 利息保障倍数：优先按 `EBIT / 利息费用`；若仅能得到财务费用，则不得直接替代，除非公司明确说明财务费用主体为利息费用，并在备注写明。
      - 应收账款周转率：`营业收入 / 平均应收账款`；若行业更常用含应收票据口径，可用 `营业收入 / 平均(应收票据 + 应收账款)`，并在备注说明。
      - 应收账款周转天数：`365 / 应收账款周转率`；若期间不是完整年度，可按实际天数或年化口径，并在备注说明。
      - 存货周转率：`营业成本 / 平均存货`。
      - 存货周转天数：`365 / 存货周转率`。
      - 应付账款周转率：`营业成本 / 平均应付账款`；若行业惯例包含应付票据，可用 `营业成本 / 平均(应付票据 + 应付账款)`，并在备注说明。
      - 应付账款周转天数：`365 / 应付账款周转率`。
      - 现金转化周期：`应收账款周转天数 + 存货周转天数 - 应付账款周转天数`。
    - 输出内容：
      | 指标类别 | 指标名称 | {FY-3} | {FY-2} | {FY-1} | {FQ0/FY0} | 单位 | 备注 |
      | --- | --- | --- | --- | --- | --- | --- | --- |
      | 盈利能力 | ROE |  |  |  |  | % | 待计算或直接披露 |
      | 盈利能力 | ROIC |  |  |  |  | % | 待计算或直接披露 |
      | 盈利能力 | ROA |  |  |  |  | % | 待计算或直接披露 |
      | 资本结构 | 资产负债率 |  |  |  |  | % | 待计算或直接披露 |
      | 资本结构 | 有息负债率 |  |  |  |  | % | 待计算或直接披露 |
      | 偿债能力 | 流动比率 |  |  |  |  | x | 待计算或直接披露 |
      | 偿债能力 | 速动比率 |  |  |  |  | x | 待计算或直接披露 |
      | 偿债能力 | 利息保障倍数 |  |  |  |  | x | 待计算或直接披露 |
      | 营运能力 | 应收账款周转率 |  |  |  |  | x | 待计算或直接披露 |
      | 营运能力 | 应收账款周转天数 |  |  |  |  | 天 | 待计算或直接披露 |
      | 营运能力 | 存货周转率 |  |  |  |  | x | 待计算或直接披露 |
      | 营运能力 | 存货周转天数 |  |  |  |  | 天 | 待计算或直接披露 |
      | 营运能力 | 应付账款周转率 |  |  |  |  | x | 待计算或直接披露 |
      | 营运能力 | 应付账款周转天数 |  |  |  |  | 天 | 待计算或直接披露 |
      | 营运能力 | 现金转化周期 |  |  |  |  | 天 | 待计算或直接披露 |

    ## ENTRY D_FIN_009
    - 问题：同行财务对比
    - 期望输出：请直接按下列 Markdown 表格结构输出与同行业可比公司的核心财务指标对比。固定覆盖收入增速、毛利率、归母净利率、归母净利润增长率、销售费用率、管理费用率、研发费用率、应收周转、存货周转、应付账款周转、资产负债率、有息负债率。各指标至少列示可比公司中位数、可比公司平均数、{company_name}；其中同行中位数和平均数必须从 {peer_info_peer_data_source_text} 中抽取，公司值来自 PDF 抽取或标记待计算。不得新增未来期间列。
