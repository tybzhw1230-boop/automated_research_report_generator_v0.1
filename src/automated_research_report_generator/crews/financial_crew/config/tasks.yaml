    - 先列相关表格，再接分析。

    ## 4. 收入、成本与费用结构分析
    - 先列相关表格，再接分析。

    ## 5. 现金流与营运资本分析
    - 先列相关表格，再接分析。

    ## 6. 资产负债与资本结构分析
    - 先列相关表格，再接分析。

    ## 7. 同行财务对比分析
    - 先列相关表格，再接分析。

    ## 8. 财务综合判断与估值含义
