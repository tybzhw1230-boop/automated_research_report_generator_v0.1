extract_financial_data:
  description: |-
    请根据 PDF 为{company_name}的财务分析包生成 File Source Markdown。
    输入：
    - PDF 文件路径：{pdf_file_path}
    - 页码索引路径：{page_index_file_path}
    - 同行数据 source 文本：{peer_info_peer_data_source_text}
    - 输出路径：{file_source_output_path}

    执行要求：
    - 先读取 PDF 页面索引，再按需读取相关页面。
    - 严格按照 expected_output 的 ENTRY 结构逐条输出，并保留 entry_id。
    - 输出内容必须基于 PDF 中的原始信息以及同行 source 中已有的同行统计信息。
    - 以稳定抽取完整表格为优先，不要擅自改动表头、列顺序和分节结构。
    - 从 PDF 中抽取公司财务原始数据、原始字段、已披露比率。
    - 从同行 source 中抽取财务分析需要的同行中位数和平均数。
    - 对未直接披露但后续可规则计算的公司指标，在对应表格备注中标记“待计算”。
    - 如果没有信息或该问题不适用该公司，也必须保留 entry_id，并在输出内容里输出“无信息”或“不适用”。
    - 只做材料抽取与表格整理，不做规则计算，不做最终结论分析。
    - 最终只输出 Markdown 正文。
  expected_output: |
