compute_financial_metrics:
  description: |-
    请基于 {company_name} 当前专题的 File Source 输出，生成财务指标计算结果。
    输入：
    - File Source：由 extract_financial_data 生成，路径为 {file_source_output_path}
    - PDF 文件路径：{pdf_file_path}
    - 页面索引路径：{page_index_file_path}
    - 输出路径：{finance_computed_metrics_output_path}

    执行要求：
    - 优先复用 File Source 传递过来的文件中中已经包括的原始字段。
