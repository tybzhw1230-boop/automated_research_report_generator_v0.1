    - 期望输出：请直接按下列 Markdown 表格结构输出利润表核心科目金额及主要利润率指标汇总。固定覆盖营业收入、营业成本、毛利润、销售费用、管理费用、研发费用、财务费用、营业利润、所得税、净利润、归母净利润、扣非归母净利润、EBITDA、EBIT、毛利率、营业利润率、净利率、扣非净利率、EBITDA利润率。不得新增未来期间列。
      单位：（如千元、万元、百万元、亿元、十亿元等）
      币种：（如人民币、港币、美元等）
    - 输出内容：
      | 指标类别 | 指标名称 | {FY-3} | {FY-2} | {FY-1} | {FQ0/FY0} | 备注 |
      | --- | --- | --- | --- | --- | --- | --- |
      | 金额 | 营业收入 |  |  |  |  |  |
      | 金额 | 营业成本 |  |  |  |  |  |
      | 金额 | 毛利润 |  |  |  |  |  |
      | 金额 | 销售费用 |  |  |  |  |  |
      | 金额 | 管理费用 |  |  |  |  |  |
      | 金额 | 研发费用 |  |  |  |  |  |
