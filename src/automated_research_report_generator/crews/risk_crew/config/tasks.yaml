extract_from_pdf:
  description: |-
    请根据 PDF 为 {company_name} 的风险分析包生成 File Source Markdown。
    输入：
    - PDF 文件路径：{pdf_file_path}
    - 页码索引路径：{page_index_file_path}
    - 输出路径：{file_source_output_path}

    执行要求：
    - 先读取 PDF 页面索引，再按需读取相关页面。
    - 严格按照 expected_output 的 ENTRY 结构逐条输出，并保留 entry_id。
    - 只提取 PDF 中已经披露、已经提示或已经明确提到的风险事实，不要自行引入其他专题或外部资料的判断。
    - 每个条目都必须完整保留 entry_id，并按“期望输出”要求填写“输出内容”。
    - 如果没有信息或该问题不适用该公司，也必须保留 entry_id，并明确写“无信息”或“不适用”。
    - 不要输出最终 pack，不要改写其他专题内容。
    - 最终只输出 Markdown 正文。
  expected_output: |
    # {company_name} 风险分析包 File Source

    ## ENTRY F_BUS_045
    - 问题：扩产项目风险
    - 期望输出：扩产项目的建设风险及产能消化风险。
    - 输出内容：

    ## ENTRY F_RISK_001
    - 问题：行业下行风险
    - 期望输出：需求下滑、周期见顶、增长放缓。
    - 输出内容：

    ## ENTRY F_RISK_002
    - 问题：市场竞争加剧风险
    - 期望输出：新进入者、替代品、价格战、份额流失。
    - 输出内容：

    ## ENTRY F_RISK_003
    - 问题：技术替代风险
    - 期望输出：技术路径变化导致产品被替代。
    - 输出内容：

    ## ENTRY F_RISK_004
    - 问题：需求结构变化风险
    - 期望输出：下游需求结构变化的风险。
    - 输出内容：

    ## ENTRY F_RISK_005
    - 问题：市场空间不及预期
    - 期望输出：行业增速低于预期的风险。
    - 输出内容：

    ## ENTRY F_RISK_006
    - 问题：价格下行风险
    - 期望输出：产品价格持续下降的风险。
    - 输出内容：

    ## ENTRY F_RISK_007
    - 问题：新市场拓展风险
    - 期望输出：新市场拓展不及预期的风险。
    - 输出内容：

    ## ENTRY F_RISK_008
    - 问题：大客户流失风险
    - 期望输出：前五大客户集中度过高、流失影响。
    - 输出内容：

    ## ENTRY F_RISK_009
    - 问题：原材料涨价风险
    - 期望输出：原材料大幅上涨且无法转嫁。
    - 输出内容：

    ## ENTRY F_RISK_010
    - 问题：供应链风险
    - 期望输出：核心供应过于集中或断供。
    - 输出内容：

    ## ENTRY F_RISK_011
    - 问题：产能过剩风险
    - 期望输出：新建产能无法消化。
    - 输出内容：

    ## ENTRY F_RISK_012
    - 问题：扩产不及预期风险
    - 期望输出：建设延期或投产后爬坡缓慢。
    - 输出内容：

    ## ENTRY F_RISK_013
    - 问题：产品质量风险
    - 期望输出：质量问题引发召回或赔偿。
    - 输出内容：

    ## ENTRY F_RISK_014
    - 问题：安全生产风险
    - 期望输出：安全事故导致停产。
    - 输出内容：

    ## ENTRY F_RISK_015
    - 问题：新品研发失败风险
    - 期望输出：新产品研发未达预期。
    - 输出内容：

    ## ENTRY F_RISK_016
    - 问题：技术路线选择风险
    - 期望输出：技术路线错误导致投资浪费。
    - 输出内容：

    ## ENTRY F_RISK_017
    - 问题：核心人员流失风险
    - 期望输出：核心技术/管理人员流失。
    - 输出内容：

    ## ENTRY F_RISK_018
    - 问题：经销商渠道风险
    - 期望输出：经销商库存积压、退出或违规。
    - 输出内容：

    ## ENTRY F_RISK_019
    - 问题：客户信用风险
    - 期望输出：大客户回款困难或违约。
    - 输出内容：

    ## ENTRY F_RISK_020
    - 问题：项目投资风险
    - 期望输出：重大投资项目收益不及预期。
    - 输出内容：

    ## ENTRY F_RISK_021
    - 问题：并购整合风险
    - 期望输出：并购标的整合失败。
    - 输出内容：

    ## ENTRY F_RISK_022
    - 问题：财务造假/粉饰风险
    - 期望输出：财务数据存在粉饰嫌疑的警示信号。
    - 输出内容：

    ## ENTRY F_RISK_023
    - 问题：公司治理风险
    - 期望输出：当前控制方减持、权力受限、或受到资本市场挑战导致的控制权变更风险；股权过度分散没有有效领导的风险；控制权过度集中导致的治理风险；家族企业可能带来的治理问题等。
    - 输出内容：

    ## ENTRY F_RISK_024
    - 问题：关联交易利益输送风险
    - 期望输出：关联交易严重不公允或利益输送。
    - 输出内容：

    ## ENTRY F_RISK_025
    - 问题：产业政策变化风险
    - 期望输出：各国行业政策变化对业务的影响。
    - 输出内容：

    ## ENTRY F_RISK_026
    - 问题：地缘政治/贸易摩擦/制裁风险
    - 期望输出：地缘政治因素、国际贸易冲突对市场/供应链的影响。
    - 输出内容：

    ## ENTRY F_RISK_027
    - 问题：自然灾害/疫情风险
    - 期望输出：不可抗力对生产经营的影响。
    - 输出内容：

    ## ENTRY F_RISK_028
    - 问题：数据安全/合规风险
    - 期望输出：数据安全相关的合规要求变化。
    - 输出内容：

    ## ENTRY F_RISK_029
    - 问题：反垄断风险
    - 期望输出：反垄断调查或处罚风险（如适用）。
    - 输出内容：

    ## ENTRY F_RISK_030
    - 问题：重大诉讼/仲裁
    - 期望输出：尚未了结的重大诉讼及可能影响。包括但不限于合同履约、知识产权、劳动争议、环境责任等方面的诉讼。
    - 输出内容：
  agent: extract_agent
  output_file: "{file_source_output_path}"

search_public_sources:
  description: |-
    请基于 {company_name} 当前已有的专题 pack，生成风险分析中间结果 Markdown。
    输入：
    - 历史与背景分析包：{history_background_pack_text}
    - 业务分析包：{business_pack_text}
    - 行业分析包：{industry_pack_text}
    - 财务分析包：{finance_pack_text}
    - 经营指标分析包：{operating_metrics_pack_text}
    - 输出路径：{search_source_output_path}

    执行要求：
    - 本任务不做公开资料搜索，不回到 PDF，不读取其他 source。
    - 只消费上游五个专题 pack，从风险视角重新整理需要注意的事项。
    - 每项风险尽量明确：风险名称、来源专题、风险传导路径、初步发生概率、初步影响等级、证据强弱、已知缓释动作、待监控信号。
    - 如果某项风险证据较弱，要明确写“提示性风险”或“证据有限”，不要装作已经证实。
    - 严格按照 expected_output 的 ENTRY 结构逐条输出，并保留 entry_id。
    - 最终只输出 Markdown 正文，不要输出最终 pack。
  expected_output: |
    # {company_name} 风险分析包 Cross-Pack Risk Analysis

    ## ENTRY D_RISK_031
    - 问题：跨专题核心风险清单
    - 期望输出：请直接按下列 Markdown 表格结构，基于 history_background、business、industry、finance、operating_metrics 五个专题 pack，整理核心风险清单。至少覆盖治理/实控人、客户/渠道、行业周期/价格、现金流/回款/杠杆、量价/产能/订单兑现等维度。不要新增未来期间列。
    - 输出内容：
      | 风险名称 | 来源专题 | 风险传导路径 | 初步发生概率 | 初步影响等级 | 证据强度 | 已知缓释动作 | 待监控信号 | 备注 |
      | --- | --- | --- | --- | --- | --- | --- | --- | --- |
      | 风险1 |  |  | 高/中/低 | 高/中/低 | 强/中/弱 |  |  |  |
      | 风险2 |  |  | 高/中/低 | 高/中/低 | 强/中/弱 |  |  |  |
      | 风险3 |  |  | 高/中/低 | 高/中/低 | 强/中/弱 |  |  |  |

    ## ENTRY D_RISK_032
    - 问题：跨专题风险注意事项
    - 期望输出：请按专题维度总结从风险角度需要特别注意的事项，至少覆盖历史背景、业务、行业、财务、经营指标五个专题。每个专题都要明确“主要风险提示”“证据边界”“最值得继续跟踪的信号”。
    - 输出内容：
      ### 历史与背景
      - 主要风险提示：
      - 证据边界：
      - 最值得继续跟踪的信号：

      ### 业务分析
      - 主要风险提示：
      - 证据边界：
      - 最值得继续跟踪的信号：

      ### 行业分析
      - 主要风险提示：
      - 证据边界：
      - 最值得继续跟踪的信号：

      ### 财务分析
      - 主要风险提示：
      - 证据边界：
      - 最值得继续跟踪的信号：

      ### 经营指标分析
      - 主要风险提示：
      - 证据边界：
      - 最值得继续跟踪的信号：

  agent: search_agent
  output_file: "{search_source_output_path}"

synthesize_and_output:
  crew_name: risk_crew
  pack_name: risk_pack
  pack_title: 风险分析包
  description: |-
    请基于 {company_name} 当前专题的两份上游产物，输出最终风险分析包。
    输入：
    - File Source：由 extract_from_pdf 生成，路径为 {file_source_output_path}
    - Cross-Pack Risk Analysis：由 search_public_sources 生成，路径为 {search_source_output_path}
    - 输出路径：{pack_output_path}

    执行要求：
    - 只基于 PDF 风险事实和跨专题风险分析结果进行综合。
    - 输出重点是风险矩阵和分层风险讨论，不要沿用旧的按经营/供应链/技术/政策分节结构。
    - 缺证据时必须写清楚“提示性风险”与“证据较强风险”的区别。
    - 对管理层是否已启动缓释措施，以及需要监控的信号，要尽量明确写出。
    - 最终 pack 不要求逐条保留 entry_id，但结论必须能追溯回上游两份材料。
    - 最终只输出 Markdown 正文。
  expected_output: |
    # {company_name} 风险分析
    ## 1. 风险矩阵
    - 请先给出一句话总览，说明当前最值得关注的风险集中在哪些象限。
    - 再直接按下列 Markdown 表格结构输出风险矩阵：
      | 风险名称 | 发生概率 | 影响等级 | 证据强度 | 来源专题 | 风险简述 | 已知缓释动作 | 待监控信号 |
      | --- | --- | --- | --- | --- | --- | --- | --- |
      | 风险1 | 高/中/低 | 高/中/低 | 强/中/弱 |  |  |  |  |
      | 风险2 | 高/中/低 | 高/中/低 | 强/中/弱 |  |  |  |  |
      | 风险3 | 高/中/低 | 高/中/低 | 强/中/弱 |  |  |  |  |

    ## 2. 高概率、高影响风险
    - 逐项详细汇总高概率、高影响的风险。
    - 对每项风险都讨论：
      - 当前风险表现或触发路径
      - 证据强度
      - 管理层是否已经启动缓释措施
      - 需要持续监控的信号

    ## 3. 低概率、高影响风险
    - 逐项详细汇总低概率、高影响的风险。
    - 对每项风险都讨论：
      - 风险为何属于低概率但高影响
      - 当前证据强度
      - 管理层是否已经启动缓释措施

    ## 4. 高概率、低影响 与 低概率、低影响风险
    - 汇总讨论其余两类风险。
    - 不要求逐项展开到和前两类同样深度，但要明确哪些风险更偏提示性、哪些风险已经值得持续监控。

  agent: synthesizing_agent
  output_file: "{pack_output_path}"
