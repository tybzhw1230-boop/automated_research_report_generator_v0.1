extract_from_pdf:
  description: |-
    请根据 PDF 为{company_name}的历史与背景分析包生成 File Source Markdown。
    输入：
    - PDF 文件路径：{pdf_file_path}
    - 页码索引路径：{page_index_file_path}
    - 输出路径：{file_source_output_path}

    执行要求：
    - 先读取 PDF 页面索引，再按需读取相关页面。
    - 严格按照 expected_output 的 ENTRY 结构逐条输出，并保留 entry_id。
    - 输出内容必须基于 PDF 中的原始信息，原则上不更改文件中的信息，尽量不选取材料中广告成分较大的部分。
    - 每个条目都必须完整保留 entry_id，并按“期望输出”要求的字段和格式填写“输出内容”。
    - 如果没有信息或该问题不适用该公司，也必须保留 entry_id，并在输出内容里输出“无信息”或“不适用”。一个entry有多个小问，部分可以回答，部分不可以回答，明确区分开。
    - 不要输出最终 pack，不要改写其他专题内容。
    - 最终只输出 Markdown 正文。
  expected_output: |
    # {company_name} 历史与背景分析包 File Source

    ## ENTRY F_HIS_001
    - 问题：公司全称与简称
    - 期望输出：全称、简称、证券代码、英文名称。
    - 输出内容：

    ## ENTRY F_HIS_002
    - 问题：地址
    - 期望输出：注册地址、总部地址等
    - 输出内容：

    ## ENTRY F_HIS_003
    - 问题：里程碑日期
    - 期望输出：成立日期、股改日期（如适用）、提交上市材料日期（如有）、拟发行日期（如有）。
    - 输出内容：

    ## ENTRY F_HIS_004
    - 问题：法定代表人
    - 期望输出：现任法定代表人及任职起始时间。
    - 输出内容：

    ## ENTRY F_HIS_005
    - 问题：注册资本
    - 期望输出：注册资本金额、实缴情况。
    - 输出内容：

    ## ENTRY F_HIS_006
    - 问题：统一社会信用代码
    - 期望输出：统一社会信用代码/营业执照编号。
    - 输出内容：

    ## ENTRY F_HIS_007
    - 问题：上市/挂牌状态
    - 期望输出：上市交易所、板块、上市日期。如果未上市，输出“未上市”。
    - 输出内容：

    ## ENTRY F_HIS_009
    - 问题：公司定位一句话描述
    - 期望输出：用一句话概括公司是做什么的、服务谁、核心价值是什么。
    - 输出内容：

    ## ENTRY F_HIS_010
    - 问题：设立背景与方式
    - 期望输出：从材料中截取公司前身、设立方式（发起/改制）、原始出资方及出资方式的相关信息，可以比较详细。
    - 输出内容：

    ## ENTRY F_HIS_011
    - 问题：历史里程碑时间线
    - 期望输出：请直接按下列 Markdown 表格结构输出上市、并购、扩产、融资等关键事件时间线。
      | 时间 | 事件类型 | 简要描述 | 重要性原因 |
      | --- | --- | --- | --- |
      |  |  |  |  |
    - 输出内容：

    ## ENTRY F_HIS_012
    - 问题：历次重大重组/并购
    - 期望输出：请直接按下列 Markdown 表格结构输出历史重大资产重组、业务重组和并购事件。
      | 时间 | 交易简要描述 | 涉及业务/资产 | 交易对方 | 交易金额（如有披露） | 对公司发展的影响 |
      | --- | --- | --- | --- | --- | --- |
      |  |  |  |  |  |  |
    - 输出内容：

    ## ENTRY F_HIS_013
    - 问题：历史战略转型
    - 期望输出：请直接按下列 Markdown 表格结构输出主营业务转型历史、商业模式变革及驱动因素。
      | 时间 | 转型前主营业务/商业模式 | 转型后主营业务/商业模式 | 驱动因素 |
      | --- | --- | --- | --- |
      |  |  |  |  |
    - 输出内容：

    ## ENTRY F_HIS_014
    - 问题：历史上的重大融资事件
    - 期望输出：请直接按下列 Markdown 表格结构输出 IPO、增发、配股、可转债等历史融资事项。
      | 时间 | 融资类型 | 发行比例（如有披露） | 融资金额（如有披露） | 融资估值（投后，如有披露） | 主要投资者（如有披露） | 融资目的及影响 |
      | --- | --- | --- | --- | --- | --- | --- |
      |  |  |  |  |  |  |  |
    - 输出内容：

    ## ENTRY F_HIS_015
    - 问题：历史上的重大诉讼/处罚
    - 期望输出：请直接按下列 Markdown 表格结构输出历史重大诉讼、行政处罚及其解决情况。
      | 时间 | 案件/处罚简要描述 | 涉及金额（如有披露） | 当前状态 | 对公司的影响 |
      | --- | --- | --- | --- | --- |
      |  |  |  |  |  |
    - 输出内容：

    ## ENTRY D_HIS_001
    - 问题：前十大股东持股明细
    - 期望输出：请直接按下列 Markdown 表格结构输出前十大股东持股明细。
      | 排名 | 股东名称 | 持股数量 | 持股比例 | 股份性质 |
      | --- | --- | --- | --- | --- |
      |  |  |  |  |  |
    - 输出内容：

    ## ENTRY F_HIS_017
    - 问题：实际控制人与控股股东
    - 期望输出：实际控制人名称及控制链条、控股股东名称、持股比例及一致行动人（action in cohert)。实际控制人的个人履历、从业背景。
    - 输出内容：

    ## ENTRY F_HIS_019
    - 问题：控股股东主营业务
    - 期望输出：控股股东除{company_name}以外的主要业务、资产规模及财务状况。如果控股股东是一个企业集团，尽量列示该集团的整体情况以及与{company_name}的关系。
    - 输出内容：

    ## ENTRY F_HIS_020
    - 问题：公司与控股股东之间的关系
    - 期望输出：控股股东资产负债率、是否存在资金紧张、公司与控股股东之间是否存在资金依赖。
    - 输出内容：

    ## ENTRY F_HIS_021
    - 问题：股东权力受限
    - 期望输出：控股股东或主要股东持股是否存在质押、冻结或其他权利受限情况。
    - 输出内容：

    ## ENTRY F_HIS_023
    - 问题：对赌协议情况
    - 期望输出：是否存在对赌协议、业绩承诺及解除情况。
    - 输出内容：

    ## ENTRY F_HIS_024
    - 问题：股权激励计划
    - 期望输出：员工持股计划、限制性股票、股票期权安排。股权激励覆盖的人数、层级及解锁条件。
    - 输出内容：

    ## ENTRY F_HIS_029
    - 问题：董事会
    - 期望输出：请直接按下列 Markdown 表格结构输出董事会信息。
      | 姓名 | 任职 | 专业委员会任职 | 简历或背景 |
      | --- | --- | --- | --- |
      |  |  |  |  |
    - 输出内容：

    ## ENTRY F_HIS_031
    - 问题：高级管理层
    - 期望输出：请直接按下列 Markdown 表格结构输出高级管理层信息。
      | 姓名 | 任职 | 简历或背景 | 薪酬 |
      | --- | --- | --- | --- |
      |  |  |  |  |
    - 输出内容：

    ## ENTRY F_HIS_032
    - 问题：管理层变动
    - 期望输出：近期内管理层变动情况，是否有重大人事调整。
    - 输出内容：

    ## ENTRY F_HIS_033
    - 问题：管理层兼职情况
    - 期望输出：董监高是否在关联方或同业兼职。
    - 输出内容：

    ## ENTRY D_HIS_004
    - 问题：主要控股子公司
    - 期望输出：请直接按下列 Markdown 表格结构输出主要控股子公司信息。
      | 子公司名称 | 持股比例 | 主营业务情况 | 财务贡献 |
      | --- | --- | --- | --- |
      |  |  |  |  |
    - 输出内容：

    ## ENTRY D_HIS_005
    - 问题：参股公司
    - 期望输出：请直接按下列 Markdown 表格结构输出参股公司信息。
      | 参股公司名称 | 主营业务 | 持股比例 |
      | --- | --- | --- |
      |  |  |  |
    - 输出内容：

    ## ENTRY D_HIS_006
    - 问题：员工分工结构及人数
    - 期望输出：请直接按下列 Markdown 表格结构输出员工专业分工结构及人数。
      | 分类 | {FY-3}人数 | {FY-2}人数 | {FY-1}人数 | {FQ-1}人数 | {FQ0/FY0}人数 | 备注 |
      | --- | --- | --- | --- | --- | --- | --- |
      | 销售 |  |  |  |  |  |  |
      | 生产 |  |  |  |  |  |  |
      | 研发 |  |  |  |  |  |  |
      | 管理 |  |  |  |  |  |  |
      | 其他 |  |  |  |  |  |  |
    - 输出内容：

    ## ENTRY D_HIS_007
    - 问题：员工分工结构及人数
    - 期望输出：请直接按下列 Markdown 表格结构输出员工学历分布及人数。
      | 学历分类 | {FY-3}人数 | {FY-2}人数 | {FY-1}人数 | {FQ-1}人数 | {FQ0/FY0}人数 | 备注 |
      | --- | --- | --- | --- | --- | --- | --- |
      | 本科以下 |  |  |  |  |  |  |
      | 本科 |  |  |  |  |  |  |
      | 硕士 |  |  |  |  |  |  |
      | 博士 |  |  |  |  |  |  |
    - 输出内容：

    ## ENTRY F_HIS_038
    - 问题：关联方清单
    - 期望输出：主要关联方名称、关系类型、主营业务。
    - 输出内容：

    ## ENTRY F_HIS_039
    - 问题：同业竞争情况
    - 期望输出：控股股东控制的企业是否存在同业竞争。
    - 输出内容：

    ## ENTRY F_HIS_040
    - 问题：关联交易占比情况
    - 期望输出：关联交易占公司收入/采购/费用的比例。
    - 输出内容：

    ## ENTRY F_HIS_041
    - 问题：关联方资金占用
    - 期望输出：是否存在关联方占用公司资金的情况。
    - 输出内容：

  agent: extract_agent
  output_file: '{file_source_output_path}'
