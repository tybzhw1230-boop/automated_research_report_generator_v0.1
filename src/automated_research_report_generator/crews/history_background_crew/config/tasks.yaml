synthesize_and_output:
  crew_name: history_background_crew
  pack_name: history_background_pack
  pack_title: 历史与背景分析包
  description: |-
    请基于 {company_name} 当前专题的两份 source md 输出 历史与背景分析包。
    输入：
    - File Source：由 extract_from_pdf 生成，路径为 {file_source_output_path}
    - Search Source：由 search_public_sources 生成，路径为 {search_source_output_path}
    - 输出路径：{pack_output_path}

    执行要求：
    - 只基于带 entry_id 的两份 source md 进行综合。
    - 对 source 中缺失或冲突的信息要显式写出边界。

    - 最终 pack 不要求逐条保留 entry_id，但结论必须能追溯回 source。
    - 最终只输出 Markdown 正文。
  expected_output: |
    严格按下列格式形成一份结构化文本，严格使用下列标题作为标题，不得遗漏以下任何一个标题，不要增加任何标题和分节。必要时可以补充表格辅助阅读。
    每节要求写明：内容 / 来源 / 待确认事项。

    # {company_name} 历史与背景分析
    ## 1. 公司基本信息与定位
    - 1.1 公司全称、注册地、成立日期、上市/拟上市状态
    - 1.2 主营业务定位与核心产品/服务概述
    - 1.3 行业归属与市场定位
    ## 2. 发展时间线与关键里程碑
    - 2.1 创立与早期发展
    - 2.2 重大业务转型、并购、融资事件
    - 2.3 上市/拟上市历程
    ## 3. 股权结构与实际控制人
    - 3.1 实际控制人及控制链条（需完整穿透）
    - 3.2 前十大股东及持股比例
    - 3.3 历次重大股权变动及时间线
    ## 4. 董监高与治理结构
    - 4.1 董事会构成与独立董事比例
    - 4.2 核心管理层履历与任期
    - 4.3 监事会与审计委员会设置
    ## 5. 关联关系与独立性判断
    - 5.1 关联方清单及关联交易概况
    - 5.2 同业竞争与独立性安排
    - 5.3 潜在治理风险信号
    ## 6. 待确认事项
    - 6.1 仍缺乏验证的关键信息
    - 6.2 信息冲突与待解决问题
  agent: synthesizing_agent
  output_file: '{pack_output_path}'
