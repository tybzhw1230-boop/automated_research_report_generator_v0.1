extract_from_pdf:
  description: |-
    请根据 PDF 为{company_name}的行业分析包生成 File Source Markdown。
    输入：
    - PDF 文件路径：{pdf_file_path}
    - 页码索引路径：{page_index_file_path}
    - 输出路径：{file_source_output_path}

    执行要求：
    - 先读取 PDF 页面索引，再按需读取相关页面。
    - 严格按照 expected_output 的 ENTRY 结构逐条输出，并保留 entry_id。
    - 输出内容必须基于 PDF 中的原始信息，原则上不更改文件中的信息，尽量不选取材料中广告成分较大的部分。
    - 每个条目都必须完整保留 entry_id，并按“期望输出”要求的字段和格式填写“输出内容”。
    - 如果没有信息或该问题不适用该公司，也必须保留 entry_id，并在输出内容里输出“无信息”或“不适用”。一个entry有多个小问，部分可以回答，部分不可以回答，明确区分开。
    - 不要输出最终 pack，不要改写其他专题内容。
    - 最终只输出 Markdown 正文。
  expected_output: |
    # {company_name} 行业分析包 File Source

    ## ENTRY F_IND_001
    - 问题：所处行业
    - 期望输出：公司所在的各个市场的MSCI行业分类标准（最细化）、Wind行业分类标准（最细化）。如果公司有多个主营业务，均需列示
    - 输出内容：

    ## ENTRY F_IND_002
    - 问题：细分领域
    - 期望输出：各个大类行业的主要细分市场及各细分市场的特征。
    - 输出内容：

    ## ENTRY F_IND_003
    - 问题：产业链全景图
    - 期望输出：上游/中游/下游定义，全链条关系，行业价值链分布（产业链附加值排名，大概比例），公司处于哪个环节，与上下游的关系。
    - 输出内容：

    ## ENTRY F_IND_006
    - 问题：全球市场规模
    - 期望输出：请直接按下列 Markdown 表格结构输出不同行业定义下的全球市场规模（金额）、历年增速、CAGR、未来3到5年预测增速/CAGR及数据来源。尽量输出表格，除非数据极度缺乏，可以用文字描述
      | 行业定义 | {FY-3}市场规模 | {FY-3}同比增速 | {FY-2}市场规模 | {FY-2}同比增速 | {FY-1}市场规模 | {FY-1}同比增速 | {FQ-1}市场规模 | {FQ-1}同比增速 | {FQ0/FY0}市场规模 | {FQ0/FY0}同比增速 | CAGR | {FY1}增速 | {FY2}增速 | {FY3}增速 | {FY4}增速（如有） | {FY5}增速（如有） | 预测CAGR | 数据来源/预测来源 |
      | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |
      | 行业定义1 |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |
      | 行业定义2（如有） |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |
      | 行业定义3（如有） |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |
    - 输出内容：

    ## ENTRY F_IND_007
    - 问题：经营地区市场/细分市场规模
    - 期望输出：请直接按下列 Markdown 表格结构输出不同行业定义下公司主要业务收入来源地区的市场规模（金额）、历年增速、CAGR、未来3到5年预测增速/CAGR及数据来源。尽量输出表格，除非数据极度缺乏，可以用文字描述
      | 行业定义 | {FY-3}市场规模 | {FY-3}同比增速 | {FY-2}市场规模 | {FY-2}同比增速 | {FY-1}市场规模 | {FY-1}同比增速 | {FQ-1}市场规模 | {FQ-1}同比增速 | {FQ0/FY0}市场规模 | {FQ0/FY0}同比增速 | CAGR | {FY1}增速 | {FY2}增速 | {FY3}增速 | {FY4}增速（如有） | {FY5}增速（如有） | 预测CAGR | 数据来源/预测来源 |
      | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |
      | 行业定义1 |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |
      | 行业定义2（如有） |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |
      | 行业定义3（如有） |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |  |
    - 输出内容：

    ## ENTRY F_IND_012
    - 问题：大类行业增长驱动因素
    - 期望输出：涉及的各个大类行业核心增长驱动因素（需求/技术/政策/人口等）。分全球和所在经营地区市场分别描述。
    - 输出内容：

    ## ENTRY F_IND_013
    - 问题：细分领域增长驱动因素
    - 期望输出：{company_name} 所在各个细分行业核心增长驱动因素（需求/技术/政策/人口等）。分全球和所在经营地区市场分别描述。
    - 输出内容：

    ## ENTRY F_IND_014
    - 问题：行业生命周期阶段
    - 期望输出：各个大类行业的生命周期导入/成长/成熟/衰退，判断依据；各个细分领域的生命周期导入/成长/成熟/衰退，判断依据。
    - 输出内容：

    ## ENTRY F_IND_015
    - 问题：行业天花板测算
    - 期望输出：行业潜在市场空间（TAM/SAM/SOM）的测算及测算逻辑和关键假设。
    - 输出内容：

    ## ENTRY F_IND_016
    - 问题：渗透率与提升空间
    - 期望输出：行业主要产品的当前渗透率及未来提升空间。
    - 输出内容：

    ## ENTRY F_IND_017
    - 问题：所在大类市场竞争格局
    - 期望输出：{company_name} 所在各个大类行业的主要玩家及份额分布。分散/集中/寡头/垄断、竞争的激烈程度
    - 输出内容：

    ## ENTRY F_IND_018
    - 问题：所在细分市场竞争格局
    - 期望输出：{company_name} 所在各个细分行业的主要玩家及份额分布。分散/集中/寡头/垄断、竞争的激烈程度
    - 输出内容：

    ## ENTRY F_IND_019
    - 问题：周期性特征
    - 期望输出：大类行业或细分行业是否有周期性，驱动因素，当前周期位置。
    - 输出内容：

    ## ENTRY F_IND_020
    - 问题：季节性特征
    - 期望输出：大类行业或细分行业是否有收入/利润的季节性波动，旺季淡季月份的主要分布。
    - 输出内容：

    ## ENTRY F_IND_021
    - 问题：区域性特征
    - 期望输出：是否有区域集中度，主要产能/市场区域是否存在错配。
    - 输出内容：

    ## ENTRY F_IND_022
    - 问题：资本密集度
    - 期望输出：行业的固定资产投资强度及资本壁垒。
    - 输出内容：

    ## ENTRY F_IND_023
    - 问题：技术密集度
    - 期望输出：行业的技术含量、R&D投入水平。
    - 输出内容：

    ## ENTRY F_IND_024
    - 问题：劳动密集度
    - 期望输出：行业的人工成本占比及自动化程度。
    - 输出内容：

    ## ENTRY F_IND_025
    - 问题：规模效应
    - 期望输出：规模效应的强弱及最低经济规模。
    - 输出内容：

    ## ENTRY F_IND_026
    - 问题：学习曲线效应
    - 期望输出：是否存在学习曲线效应（是随着产品累计产量的增加，单位产品的时间会以一定的比例下降。），产量累积对成本下降的影响。
    - 输出内容：

    ## ENTRY F_IND_027
    - 问题：网络效应
    - 期望输出：是否存在网络效应及其强弱。
    - 输出内容：

    ## ENTRY F_IND_028
    - 问题：客户转换成本
    - 期望输出：行业客户的转换成本高低及锁定效应。
    - 输出内容：

    ## ENTRY F_IND_030
    - 问题：主要竞争维度
    - 期望输出：请直接按下列 Markdown 表格结构输出主要竞争维度、各维度竞争逻辑、优异/达标/劣势评判标准，以及公司在各维度上的表现和支持依据。
      | 竞争维度 | 竞争逻辑 | 优异标准 | 达标标准 | 劣势标准 | 公司表现 | 支持依据 |
      | --- | --- | --- | --- | --- | --- | --- |
      | 产品设计 |  |  |  |  |  |  |
      | 价格 |  |  |  |  |  |  |
      | 技术 |  |  |  |  |  |  |
      | 品牌 |  |  |  |  |  |  |
      | 渠道 |  |  |  |  |  |  |
      | 服务 |  |  |  |  |  |  |
    - 输出内容：

    ## ENTRY F_IND_031
    - 问题：公司市场地位与份额
    - 期望输出：{company_name}在各个细分市场排名、市场份额及报告期内的变化趋势、近期市场排名上升/下降的主要原因。
    - 输出内容：

    ## ENTRY F_IND_033
    - 问题：进入壁垒
    - 期望输出：新进入者面临的壁垒（资金/技术/牌照/规模等）。
    - 输出内容：

    ## ENTRY F_IND_034
    - 问题：退出壁垒
    - 期望输出：行业退出壁垒的高低及对竞争的影响。
    - 输出内容：

    ## ENTRY F_IND_035
    - 问题：潜在进入者
    - 期望输出：可能的跨界竞争者或主要竞争者类型及进入动机。
    - 输出内容：

    ## ENTRY F_IND_036
    - 问题：替代品威胁
    - 期望输出：替代技术或替代产品对大类行业即细分行业的威胁。
    - 输出内容：

    ## ENTRY F_IND_037
    - 问题：上游供应格局
    - 期望输出：各类主要原材料的供给来源地、集中度、价格走势、供应稳定性。行业内公司对各种主要下游客户的议价能力及趋势。上游各类主要原材料供应商向{company_name}所在行业价格传导能力及趋势。
    - 输出内容：

    ## ENTRY F_IND_038
    - 问题：下游需求格局
    - 期望输出：最终用户的特征、需求偏好及支付意愿。下游主要应用领域及需求占比。各下游应用领域的发展前景。下游客户的集中度及主要客户特征。行业内公司对各种主要下游客户的议价能力及发展趋势。
    - 输出内容：

    ## ENTRY F_IND_039
    - 问题：竞争格局演变趋势
    - 期望输出：未来3-5年竞争格局可能的演变方向。
    - 输出内容：

    ## ENTRY F_IND_040
    - 问题：竞争对手1深度画像
    - 期望输出：第1号核心竞争对手的产品矩阵、业务模式、竞争策略、优劣势及最新动态。
    - 输出内容：


    ## ENTRY F_IND_041
    - 问题：竞争对手2深度画像
    - 期望输出：第2号核心竞争对手的产品矩阵、业务模式、竞争策略、优劣势及最新动态。
    - 输出内容：


    ## ENTRY F_IND_042
    - 问题：竞争对手3深度画像
    - 期望输出：第3号核心竞争对手的产品矩阵、业务模式、竞争策略、优劣势及最新动态。
    - 输出内容：


    ## ENTRY F_IND_043
    - 问题：竞争对手4深度画像
    - 期望输出：第4号核心竞争对手的产品矩阵、业务模式、竞争策略、优劣势及最新动态。
    - 输出内容：


    ## ENTRY F_IND_044
    - 问题：竞争对手5深度画像
    - 期望输出：第5号核心竞争对手的产品矩阵、业务模式、竞争策略、优劣势及最新动态。
    - 输出内容：


    ## ENTRY F_IND_045
    - 问题：相对竞争对手的优劣势
    - 期望输出：与核心竞争对手在行业内主要竞争维度的对比。
    - 输出内容：

    ## ENTRY F_IND_047
    - 问题：主要法律法规
    - 期望输出：行业在全球各个主要国家的监管框架。包括主要法律、主管部门、准入制度、监管牌照要求、资质要求等内容。
    - 输出内容：

    ## ENTRY F_IND_049
    - 问题：产业政策方向
    - 期望输出：{company_name}经营所在国家/地方对行业的支持或限制政策。也包括相关的政府补贴、税收优惠政策。
    - 输出内容：

    ## ENTRY F_IND_051
    - 问题：国际贸易政策
    - 期望输出：出口管制、关税、反倾销等影响。
    - 输出内容：

    ## ENTRY F_IND_052
    - 问题：外资准入政策
    - 期望输出：{company_name}经营所在国家/地方对外资的进入行业的准入限制。公司拟拓展市场的行业准入限制。
    - 输出内容：

    ## ENTRY F_IND_053
    - 问题：知识产权保护
    - 期望输出：行业知识产权保护力度及专利格局（如主要专利持有者等）。行业内专利是否带给公司/其他玩家不平等竞争优势
    - 输出内容：

    ## ENTRY F_IND_054
    - 问题：数据安全/隐私监管
    - 期望输出：数据安全相关的监管要求（如适用）。
    - 输出内容：

    ## ENTRY D_IND_002
    - 问题：下游应用A市场规模
    - 期望输出：下游应用A的市场规模及增速。
    - 输出内容：

    ## ENTRY D_IND_003
    - 问题：下游应用B市场规模
    - 期望输出：下游应用B的市场规模及增速。
    - 输出内容：

    ## ENTRY D_IND_004
    - 问题：下游应用C市场规模
    - 期望输出：下游应用C的市场规模及增速。
    - 输出内容：

    ## ENTRY F_IND_061
    - 问题：技术路径
    - 期望输出：当前行业主流的技术路径及优劣势比较。下一代技术的方向及时间表预期。
    - 输出内容：

    ## ENTRY F_IND_066
    - 问题：行业未来3-5年发展趋势
    - 期望输出：行业最重要的3-5个发展趋势。
    - 输出内容：

    ## ENTRY F_IND_067
    - 问题：并购整合趋势
    - 期望输出：并购活跃度、方向及对格局的影响。
    - 输出内容：

    ## ENTRY F_IND_068
    - 问题：商业模式创新
    - 期望输出：行业内新兴的商业模式及发展前景。
    - 输出内容：

  agent: extract_agent
  output_file: '{file_source_output_path}'
