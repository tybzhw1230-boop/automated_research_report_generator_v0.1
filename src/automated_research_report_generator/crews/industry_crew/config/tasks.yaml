synthesize_and_output:
  crew_name: industry_crew
  pack_name: industry_pack
  pack_title: 行业分析包
  description: |-
    请基于 {company_name} 当前专题的两份 source md 输出 行业分析包。
    输入：
    - File Source：由 extract_from_pdf 生成，路径为 {file_source_output_path}
    - Search Source：由 search_public_sources 生成，路径为 {search_source_output_path}
    - 输出路径：{pack_output_path}

    执行要求：
    - 只基于带 entry_id 的两份 source md 进行综合。
    - 对 source 中缺失或冲突的信息要显式写出边界。

    - 最终 pack 不要求逐条保留 entry_id，但结论必须能追溯回 source。
    - 最终只输出 Markdown 正文。
  expected_output: |
    严格按下列格式形成一份结构化文本，严格使用下列标题作为标题，不得遗漏以下任何一个标题，不要增加任何标题和分节。必要时可以补充表格辅助阅读。
    每节要求写明：核心结论 / 关键证据或数据 / 冲突点 / 待确认事项。每节需明确指出 {company_name} 在 PDF 中对于本主题的描述与外部客观数据是否存在分歧。

    # {industry} 行业分析
    ## 1. 市场规模与增长驱动因素
    - 1.1 当前市场规模及未来预期（需包含具体数据，并明确地区、产品范围与时间口径）
    - 1.2 增长驱动因素与主要约束因素
    - 1.3 明确指出 {company_name} 在 PDF 中对于本主题的描述与外部客观数据是否存在分歧
    ## 2. 产业链结构分析
    - 2.1 核心上游原材料、关键零部件或基础投入品
    - 2.2 供应商类型、集中度特征、议价能力及其对成本的影响
    - 2.3 主要下游应用领域、客户群体特征及需求变化趋势
    - 2.4 明确指出 {company_name} 在 PDF 中对于本主题的描述与外部客观数据是否存在分歧
    ## 3. 竞争格局与主要参与者
    - 3.1 市场集中度及主要竞争对手列表
    - 3.2 {company_name} 在行业中的市场地位及相对优劣势
    - 3.3 明确指出 {company_name} 在 PDF 中对于本主题的描述与外部客观数据是否存在分歧
    ## 4. 行业壁垒、替代品与进入门槛
    - 4.1 新进入者面临的门槛（如资金、技术、渠道、认证、产能等）
    - 4.2 潜在替代产品或替代服务
    - 4.3 明确指出 {company_name} 在 PDF 中对于本主题的描述与外部客观数据是否存在分歧
    ## 5. 监管环境与政策导向
    - 5.1 核心监管政策及其对行业的潜在影响
    - 5.2 外部监管政策是否存在重大变化；如有，说明预计时间表及对行业发展的影响
    - 5.3 明确指出 {company_name} 在 PDF 中对于本主题的描述与外部客观数据是否存在分歧
  agent: synthesizing_agent
  output_file: '{pack_output_path}'
